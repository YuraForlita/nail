<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailArt Studio Pro - Managed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .admin-gradient { background: linear-gradient(135deg, #1a1a1a 0%, #3d3d3d 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#fdfcfb] text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        // --- КОНФІГУРАЦІЯ FIREBASE ---
        const firebaseConfig = {
        apiKey: "AIzaSyDaE80NIYOWs7f9FZ2lxK_6dbocBsrgqmg",
        authDomain: "nail-e8a3c.firebaseapp.com",
        projectId: "nail-e8a3c",
        storageBucket: "nail-e8a3c.firebasestorage.app",
        messagingSenderId: "1064829438247",
        appId: "1:1064829438247:web:75278e58ed0c259d720102",
        measurementId: "G-SSVYQB90HH"
        };

        // Перевірка наявності конфігурації
        const isConfigReady = firebaseConfig.apiKey !== "";
        if (isConfigReady) {
            firebase.initializeApp(firebaseConfig);
        }

        const { useState, useEffect } = React;

        const SERVICES = [
            { id: 1, name: "Естетичний манікюр", price: 500, time: "1.5 год", img: "https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=400" },
            { id: 2, name: "Покриття гель-лаком", price: 750, time: "2 год", img: "https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=400" },
            { id: 3, name: "Нарощування нігтів", price: 1100, time: "3 год", img: "https://images.unsplash.com/photo-1519014816548-bf5fe059798b?auto=format&fit=crop&w=400" }
        ];

        const TIME_SLOTS = ["09:00", "11:00", "13:00", "15:00", "17:00", "19:00"];
        const ADMIN_EMAIL = "admin@nail.com"; // ЗАМІНІТЬ НА ВАШ АДМІН-EMAIL

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ instagram: '' });
            const [isAdmin, setIsAdmin] = useState(false);
            const [view, setView] = useState('home'); // home, booking, cabinet, admin
            const [appointments, setAppointments] = useState([]);
            const [blockedSlots, setBlockedSlots] = useState([]);
            const [showLogin, setShowLogin] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!isConfigReady) return;
                const unsubscribe = firebase.auth().onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        setIsAdmin(u.email === ADMIN_EMAIL);
                        const doc = await firebase.firestore().collection("users").doc(u.uid).get();
                        if (doc.exists) setProfile(doc.data());
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                        setProfile({ instagram: '' });
                        if (view === 'cabinet' || view === 'admin') setView('home');
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [view]);

            useEffect(() => {
                if (!user || !isConfigReady) return;
                const db = firebase.firestore();
                
                const unsubApps = db.collection("appointments").onSnapshot(snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setAppointments(u.email === ADMIN_EMAIL ? data : data.filter(a => a.userId === user.uid));
                });

                const unsubBlocked = db.collection("settings").doc("schedule").onSnapshot(doc => {
                    if (doc.exists) setBlockedSlots(doc.data().blocked || []);
                });

                return () => { unsubApps(); unsubBlocked(); };
            }, [user]);

            if (!isConfigReady) return <ConfigError />;
            if (loading) return <div className="h-screen flex items-center justify-center font-black animate-pulse">NailArt Pro...</div>;

            return (
                <div className="min-h-screen">
                    {/* Навігація */}
                    <nav className="sticky top-0 z-50 glass border-b border-stone-100">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                                <div className="w-10 h-10 bg-pink-500 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-pink-200">N</div>
                                <span className="text-xl font-black tracking-tighter uppercase">NailArt <span className="text-pink-500 font-serif lowercase italic font-normal">pro</span></span>
                            </div>

                            <div className="hidden md:flex items-center gap-8 text-sm font-bold uppercase tracking-widest">
                                <button onClick={() => setView('home')} className={view==='home'?'text-pink-500':'text-stone-400'}>Головна</button>
                                <button onClick={() => setView('booking')} className={view==='booking'?'text-pink-500':'text-stone-400'}>Запис</button>
                                {user && !isAdmin && <button onClick={() => setView('cabinet')} className={view==='cabinet'?'text-pink-500':'text-stone-400'}>Мій Кабінет</button>}
                                {isAdmin && <button onClick={() => setView('admin')} className={`px-4 py-2 rounded-lg ${view==='admin'?'bg-pink-500 text-white':'bg-stone-900 text-white'}`}>Управління</button>}
                            </div>

                            <div className="flex items-center gap-4">
                                {!user ? (
                                    <button onClick={() => setShowLogin(true)} className="bg-pink-500 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-pink-100 transition hover:bg-pink-600">Вхід</button>
                                ) : (
                                    <div className="flex items-center gap-3">
                                        <div className="text-right hidden sm:block">
                                            <p className="text-[10px] font-black uppercase text-stone-400 leading-none">{isAdmin ? 'Адміністратор' : 'Клієнт'}</p>
                                            <p className="text-xs font-bold">{user.email.split('@')[0]}</p>
                                        </div>
                                        <button onClick={() => firebase.auth().signOut()} className="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </nav>

                    {/* Контентна частина */}
                    <main className="max-w-6xl mx-auto p-6">
                        {view === 'home' && <HomeView setView={setView} />}
                        {view === 'booking' && (
                            <BookingView 
                                user={user} 
                                profile={profile} 
                                blockedSlots={blockedSlots} 
                                onBook={async (data) => {
                                    await firebase.firestore().collection("appointments").add({...data, status: 'pending', createdAt: new Date().toISOString()});
                                    setView('cabinet');
                                }} 
                                onLogin={() => setShowLogin(true)} 
                            />
                        )}
                        {view === 'cabinet' && user && !isAdmin && (
                            <CabinetView 
                                user={user} 
                                profile={profile} 
                                appointments={appointments}
                                onUpdateProfile={async (data) => {
                                    await firebase.firestore().collection("users").doc(user.uid).set(data, {merge: true});
                                    setProfile(data);
                                }}
                            />
                        )}
                        {view === 'admin' && isAdmin && (
                            <AdminView 
                                appointments={appointments} 
                                blockedSlots={blockedSlots} 
                                onToggleBlock={async (date, time) => {
                                    const isBlocked = blockedSlots.find(b => b.date === date && b.time === time);
                                    const newList = isBlocked 
                                        ? blockedSlots.filter(b => !(b.date === date && b.time === time))
                                        : [...blockedSlots, {date, time}];
                                    await firebase.firestore().collection("settings").doc("schedule").set({ blocked: newList });
                                }} 
                                onUpdateStatus={(id, s) => firebase.firestore().collection("appointments").doc(id).update({status: s})} 
                            />
                        )}
                    </main>

                    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
                </div>
            );
        }

        // --- КОМПОНЕНТИ ПОДІЛУ ---

        function HomeView({ setView }) {
            return (
                <div className="py-12 space-y-20">
                    <section className="flex flex-col md:flex-row items-center gap-12">
                        <div className="flex-1 space-y-8">
                            <h1 className="text-6xl font-black leading-tight">Професійний догляд <span className="text-pink-500 font-serif italic">ваших рук</span></h1>
                            <p className="text-stone-500 text-lg">Записуйтесь онлайн, керуйте візитами та отримуйте найкращий сервіс у нашому особистому кабінеті.</p>
                            <button onClick={() => setView('booking')} className="bg-stone-900 text-white px-10 py-5 rounded-2xl font-bold shadow-2xl hover:bg-black transition transform hover:-translate-y-1">Записатись на манікюр</button>
                        </div>
                        <div className="flex-1">
                            <img src="https://images.unsplash.com/photo-1610992015732-2449b0c26670?auto=format&fit=crop&w=800" className="rounded-[3rem] shadow-2xl rotate-2" alt="Nail Art" />
                        </div>
                    </section>
                </div>
            );
        }

        function BookingView({ user, profile, blockedSlots, onBook, onLogin }) {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({ service: '', date: '', time: '' });

            if (!user) return (
                <div className="max-w-md mx-auto py-20 text-center space-y-6 bg-white p-10 rounded-[3rem] shadow-sm">
                    <div className="text-5xl">🔐</div>
                    <h2 className="text-2xl font-bold">Увійдіть для запису</h2>
                    <p className="text-stone-400">Тільки авторизовані клієнти можуть бачити вільні години та бронювати послуги.</p>
                    <button onClick={onLogin} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold">Авторизуватися зараз</button>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-stone-100">
                    {step === 1 && (
                        <div className="space-y-6">
                            <h2 className="text-2xl font-black">1. Оберіть послугу</h2>
                            <div className="grid gap-3">
                                {SERVICES.map(s => (
                                    <button key={s.id} onClick={() => {setData({...data, service: s.name}); setStep(2);}} className="flex items-center p-4 border-2 border-stone-50 rounded-2xl hover:border-pink-500 transition text-left">
                                        <div className="flex-1 font-bold">{s.name}</div>
                                        <div className="text-pink-500 font-black">{s.price} ₴</div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="space-y-6">
                            <h2 className="text-2xl font-black">2. Дата та час</h2>
                            <input type="date" className="w-full p-4 bg-stone-50 rounded-xl outline-none" min={new Date().toISOString().split('T')[0]} onChange={e => setData({...data, date: e.target.value})} />
                            <div className="grid grid-cols-3 gap-2">
                                {TIME_SLOTS.map(t => {
                                    const isBlocked = blockedSlots.find(b => b.date === data.date && b.time === t);
                                    return (
                                        <button key={t} disabled={isBlocked} onClick={() => setData({...data, time: t})} className={`p-3 rounded-xl font-bold text-sm ${isBlocked ? 'bg-stone-100 text-stone-300' : data.time === t ? 'bg-pink-500 text-white' : 'bg-stone-50'}`}>
                                            {t}
                                        </button>
                                    );
                                })}
                            </div>
                            <div className="flex gap-4 pt-4">
                                <button onClick={() => setStep(1)} className="flex-1 font-bold text-stone-400">Назад</button>
                                <button disabled={!data.time || !data.date} onClick={() => setStep(3)} className="flex-[2] bg-stone-900 text-white py-4 rounded-xl font-bold disabled:opacity-20">Підтвердити</button>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="space-y-6 text-center">
                            <div className="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto text-2xl">✓</div>
                            <h2 className="text-2xl font-black">Перевірте дані</h2>
                            <div className="bg-stone-50 p-6 rounded-2xl text-left space-y-2">
                                <p>Послуга: <b>{data.service}</b></p>
                                <p>Час: <b>{data.date} о {data.time}</b></p>
                                <p>Instagram: <b className="text-pink-500">@{profile.instagram || 'не вказано'}</b></p>
                            </div>
                            <button onClick={() => onBook({...data, instagram: profile.instagram, userId: user.uid, userEmail: user.email})} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold">Бронюю</button>
                        </div>
                    )}
                </div>
            );
        }

        function CabinetView({ user, profile, appointments, onUpdateProfile }) {
            const [ig, setIg] = useState(profile.instagram || '');
            return (
                <div className="grid md:grid-cols-3 gap-8 py-8">
                    <div className="space-y-6">
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-stone-100 text-center">
                            <div className="w-24 h-24 bg-pink-100 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl">👩</div>
                            <h3 className="font-black">{user.email}</h3>
                            <div className="mt-6 text-left space-y-4">
                                <label className="text-[10px] font-black uppercase text-stone-400">Мій Instagram</label>
                                <input value={ig} onChange={e => setIg(e.target.value)} placeholder="@your_nik" className="w-full p-4 bg-stone-50 rounded-xl outline-none focus:ring-2 ring-pink-500" />
                                <button onClick={() => onUpdateProfile({instagram: ig})} className="w-full bg-stone-900 text-white py-3 rounded-xl font-bold">Оновити профіль</button>
                            </div>
                        </div>
                    </div>
                    <div className="md:col-span-2 space-y-4">
                        <h2 className="text-2xl font-black">Мої записи</h2>
                        {appointments.length === 0 ? (
                            <div className="p-20 text-center text-stone-300 font-bold border-2 border-dashed rounded-[2rem]">Поки що немає записів</div>
                        ) : (
                            appointments.map(a => (
                                <div key={a.id} className="bg-white p-6 rounded-2xl border flex justify-between items-center">
                                    <div>
                                        <div className="font-black text-lg">{a.service}</div>
                                        <div className="text-stone-400">{a.date} о {a.time}</div>
                                    </div>
                                    <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${a.status==='confirmed'?'bg-green-100 text-green-600':'bg-yellow-100 text-yellow-600'}`}>
                                        {a.status==='confirmed' ? 'Підтверджено' : 'В обробці'}
                                    </span>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        function AdminView({ appointments, blockedSlots, onToggleBlock, onUpdateStatus }) {
            const [tab, setTab] = useState('requests');
            const dates = Array.from({length: 7}, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() + i);
                return d.toISOString().split('T')[0];
            });

            return (
                <div className="py-8 space-y-8">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-black">Панель Адміністратора</h2>
                        <div className="bg-stone-100 p-1 rounded-xl flex gap-1">
                            {['requests', 'schedule'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`px-5 py-2 rounded-lg text-xs font-black uppercase ${tab===t?'bg-white shadow-sm':'text-stone-400'}`}>
                                    {t === 'requests' ? 'Запити' : 'Графік'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {tab === 'requests' && (
                        <div className="space-y-4">
                            {appointments.filter(a => a.status === 'pending').map(a => (
                                <div key={a.id} className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-3">
                                            <span className="font-black text-xl">{a.service}</span>
                                            <span className="bg-pink-100 text-pink-500 text-[10px] px-2 py-0.5 rounded font-black uppercase">@{a.instagram}</span>
                                        </div>
                                        <p className="text-stone-400 font-bold">{a.date} о {a.time} • {a.userEmail}</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => onUpdateStatus(a.id, 'confirmed')} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold">Прийняти</button>
                                        <button onClick={() => onUpdateStatus(a.id, 'rejected')} className="bg-stone-100 text-red-500 px-6 py-3 rounded-xl font-bold">Відхилити</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'schedule' && (
                        <div className="bg-white p-8 rounded-[3rem] border shadow-sm overflow-x-auto">
                            <div className="min-w-[700px] flex gap-4">
                                {dates.map(date => (
                                    <div key={date} className="flex-1 space-y-2">
                                        <div className="text-center mb-4">
                                            <p className="text-[10px] font-black text-stone-300 uppercase leading-none">{new Date(date).toLocaleDateString('uk-UA', {weekday: 'short'})}</p>
                                            <p className="font-black text-lg">{new Date(date).getDate()}</p>
                                        </div>
                                        {TIME_SLOTS.map(t => {
                                            const isBlocked = blockedSlots.find(b => b.date === date && b.time === t);
                                            return (
                                                <button key={t} onClick={() => onToggleBlock(date, t)} className={`w-full p-3 rounded-xl text-[10px] font-black transition ${isBlocked ? 'bg-red-500 text-white' : 'bg-stone-50 text-stone-400 hover:bg-stone-200'}`}>
                                                    {isBlocked ? 'ЗАКРИТО' : t}
                                                </button>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function LoginModal({ onClose }) {
            const [isReg, setIsReg] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                try {
                    if (isReg) await firebase.auth().createUserWithEmailAndPassword(email, pass);
                    else await firebase.auth().signInWithEmailAndPassword(email, pass);
                    onClose();
                } catch (e) { alert("Помилка: " + e.message); }
            };

            return (
                <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl relative">
                        <button onClick={onClose} className="absolute top-6 right-6 text-stone-300">✕</button>
                        <h2 className="text-3xl font-black mb-8">{isReg ? 'Реєстрація' : 'Вхід'}</h2>
                        <form className="space-y-4" onSubmit={handleAuth}>
                            <input type="email" placeholder="Email" required className="w-full p-4 bg-stone-50 rounded-xl outline-none border focus:border-pink-500" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Пароль" required className="w-full p-4 bg-stone-50 rounded-xl outline-none border focus:border-pink-500" value={pass} onChange={e => setPass(e.target.value)} />
                            <button className="w-full bg-pink-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-pink-100">{isReg ? 'Створити акаунт' : 'Увійти'}</button>
                        </form>
                        <button onClick={() => setIsReg(!isReg)} className="w-full mt-6 text-xs font-black text-stone-400 uppercase tracking-widest">{isReg ? 'Вже є акаунт? Увійти' : 'Немає акаунту? Реєстрація'}</button>
                    </div>
                </div>
            );
        }

        function ConfigError() {
            return (
                <div className="h-screen flex items-center justify-center text-center p-10">
                    <div className="max-w-md bg-white p-10 rounded-[2rem] shadow-xl border border-red-100">
                        <div className="text-4xl mb-4">⚙️</div>
                        <h1 className="text-xl font-black mb-2">Налаштуйте Firebase</h1>
                        <p className="text-stone-400 text-sm">Щоб сайт запрацював, будь ласка, додайте свої ключі <b>firebaseConfig</b> у вихідний код файлу.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
