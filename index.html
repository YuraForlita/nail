<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailArt Studio Pro - Firebase</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    </style>
</head>
<body class="bg-[#fcfaf9] text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
        apiKey: "AIzaSyDaE80NIYOWs7f9FZ2lxK_6dbocBsrgqmg",
        authDomain: "nail-e8a3c.firebaseapp.com",
        projectId: "nail-e8a3c",
        storageBucket: "nail-e8a3c.firebasestorage.app",
        messagingSenderId: "1064829438247",
        appId: "1:1064829438247:web:75278e58ed0c259d720102",
        measurementId: "G-SSVYQB90HH"
        };

        const isConfigEmpty = firebaseConfig.apiKey.includes("ВАШ_");

        if (!isConfigEmpty) {
            firebase.initializeApp(firebaseConfig);
        }

        const { useState, useEffect, useMemo } = React;

        const SERVICES = [
            { id: 1, name: "Естетичний манікюр", price: 500, time: "1.5 год", img: "https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=400" },
            { id: 2, name: "Покриття гель-лаком", price: 750, time: "2 год", img: "https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=400" },
            { id: 3, name: "Нарощування нігтів", price: 1100, time: "3 год", img: "https://images.unsplash.com/photo-1519014816548-bf5fe059798b?auto=format&fit=crop&w=400" }
        ];

        const TIME_SLOTS = ["09:00", "11:00", "13:00", "15:00", "17:00", "19:00"];

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ instagram: '' });
            const [isAdmin, setIsAdmin] = useState(false);
            const [view, setView] = useState('home');
            const [appointments, setAppointments] = useState([]);
            const [blockedSlots, setBlockedSlots] = useState([]); // [{date, time}]
            const [toast, setToast] = useState(null);
            const [showLogin, setShowLogin] = useState(false);

            useEffect(() => {
                if (isConfigEmpty) return;
                const auth = firebase.auth();
                const db = firebase.firestore();

                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        setIsAdmin(u.email === 'admin@nail.com');
                        const doc = await db.collection("users").doc(u.uid).get();
                        if (doc.exists) setProfile(doc.data());
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || isConfigEmpty) return;
                const db = firebase.firestore();
                
                // Слухаємо записи
                const unsubApps = db.collection("appointments").onSnapshot(snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setAppointments(isAdmin ? data : data.filter(a => a.userId === user.uid));
                });

                // Слухаємо заблокований розклад
                const unsubBlocked = db.collection("settings").doc("schedule").onSnapshot(doc => {
                    if (doc.exists) setBlockedSlots(doc.data().blocked || []);
                });

                return () => { unsubApps(); unsubBlocked(); };
            }, [user, isAdmin]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const updateProfile = async (data) => {
                try {
                    await firebase.firestore().collection("users").doc(user.uid).set(data, {merge: true});
                    setProfile(data);
                    showToast("Профіль оновлено");
                } catch (e) { showToast("Помилка профілю", "error"); }
            };

            const toggleBlockTime = async (date, time) => {
                if (!isAdmin) return;
                const isBlocked = blockedSlots.find(b => b.date === date && b.time === time);
                const newList = isBlocked 
                    ? blockedSlots.filter(b => !(b.date === date && b.time === time))
                    : [...blockedSlots, {date, time}];
                
                await firebase.firestore().collection("settings").doc("schedule").set({ blocked: newList });
                showToast(isBlocked ? "Час розблоковано" : "Час закрито для запису");
            };

            if (isConfigEmpty) return <ConfigError />;

            return (
                <div className="min-h-screen pb-20 md:pb-0">
                    {/* Header */}
                    <nav className="sticky top-0 z-50 glass border-b border-stone-100">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                                <div className="w-10 h-10 bg-pink-500 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-pink-200 italic">N</div>
                                <span className="text-xl font-black tracking-tighter uppercase">NailArt <span className="text-pink-500 font-serif lowercase italic font-normal">pro</span></span>
                            </div>
                            <div className="hidden md:flex items-center gap-8 text-sm font-bold uppercase tracking-widest text-stone-500">
                                <button onClick={() => setView('home')} className={view==='home'?'text-pink-500':''}>Головна</button>
                                <button onClick={() => setView('booking')} className={view==='booking'?'text-pink-500':''}>Запис</button>
                                <button onClick={() => setView('cabinet')} className={view==='cabinet'?'text-pink-500':''}>Кабінет</button>
                                {isAdmin && <button onClick={() => setView('admin')} className="bg-stone-900 text-white px-4 py-2 rounded-lg">Панель</button>}
                            </div>
                            {!user ? (
                                <button onClick={() => setShowLogin(true)} className="bg-pink-500 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-pink-100 transition hover:bg-pink-600">Вхід</button>
                            ) : (
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-stone-100 border flex items-center justify-center overflow-hidden">
                                        <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} alt="avatar" />
                                    </div>
                                    <button onClick={() => firebase.auth().signOut()} className="text-stone-300 hover:text-red-500 transition"><i className="fas fa-sign-out-alt"></i></button>
                                </div>
                            )}
                        </div>
                    </nav>

                    {/* Content */}
                    <main className="max-w-6xl mx-auto p-6">
                        {view === 'home' && <HomeView setView={setView} />}
                        {view === 'booking' && <BookingView user={user} profile={profile} blockedSlots={blockedSlots} onBook={async (data) => {
                            await firebase.firestore().collection("appointments").add({...data, status: 'pending', createdAt: new Date().toISOString()});
                            showToast("Чекайте на підтвердження!");
                            setView('cabinet');
                        }} onLogin={() => setShowLogin(true)} />}
                        {view === 'cabinet' && <CabinetView user={user} profile={profile} onUpdateProfile={updateProfile} appointments={appointments} />}
                        {view === 'admin' && isAdmin && <AdminView appointments={appointments} blockedSlots={blockedSlots} onToggleBlock={toggleBlockTime} onUpdateStatus={(id, s) => firebase.firestore().collection("appointments").doc(id).update({status: s})} />}
                    </main>

                    {/* Toast & Login */}
                    {toast && <div className={`fixed bottom-10 right-10 px-6 py-4 rounded-2xl shadow-2xl text-white font-bold z-[100] transition-all transform animate-bounce ${toast.type==='success'?'bg-stone-900':'bg-red-500'}`}>{toast.msg}</div>}
                    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
                </div>
            );
        }

        // --- VIEWS ---

        function HomeView({ setView }) {
            const portfolio = [
                "https://images.unsplash.com/photo-1607779097040-26e80aa78e66?auto=format&fit=crop&w=500",
                "https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=500",
                "https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=500",
                "https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=500"
            ];
            return (
                <div className="space-y-20 py-10">
                    <section className="flex flex-col md:flex-row items-center gap-12">
                        <div className="flex-1 space-y-6">
                            <span className="bg-pink-100 text-pink-600 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest">Premium Nails Studio</span>
                            <h1 className="text-5xl md:text-7xl font-black leading-none">Мистецтво на ваших <span className="text-pink-500 font-serif italic">кінчиках</span> пальців.</h1>
                            <p className="text-stone-500 text-lg">Забудьте про звичайний манікюр. Ми створюємо стиль, який підкреслює вашу індивідуальність.</p>
                            <div className="flex gap-4">
                                <button onClick={() => setView('booking')} className="bg-stone-900 text-white px-10 py-5 rounded-2xl font-bold shadow-xl hover:bg-black transition">Записатись зараз</button>
                                <div className="flex -space-x-4 items-center pl-4">
                                    {[1,2,3].map(i => <div key={i} className="w-12 h-12 rounded-full border-4 border-white overflow-hidden bg-stone-200"><img src={`https://i.pravatar.cc/100?u=${i}`} /></div>)}
                                    <span className="pl-6 text-sm font-bold text-stone-400">500+ задоволених клієнтів</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 relative">
                            <div className="absolute -inset-4 bg-pink-100 rounded-[3rem] -rotate-3"></div>
                            <img src="https://images.unsplash.com/photo-1610992015732-2449b0c26670?auto=format&fit=crop&w=800" className="relative rounded-[2.5rem] shadow-2xl w-full object-cover h-[500px]" alt="Hero" />
                        </div>
                    </section>

                    <section className="space-y-8">
                        <div className="flex justify-between items-end">
                            <div>
                                <h2 className="text-3xl font-black">Портфоліо робіт</h2>
                                <p className="text-stone-400">Наші останні творіння</p>
                            </div>
                            <button className="text-pink-500 font-bold hover:underline">Більше в Instagram →</button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {portfolio.map((img, i) => (
                                <div key={i} className="group relative overflow-hidden rounded-3xl aspect-square">
                                    <img src={img} className="w-full h-full object-cover transition duration-500 group-hover:scale-110" />
                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                        <span className="text-white font-bold border-2 border-white px-4 py-2 rounded-full">Переглянути</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        }

        function BookingView({ user, profile, blockedSlots, onBook, onLogin }) {
            const [step, setStep] = useState(1);
            const [selectedService, setSelectedService] = useState(null);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [time, setTime] = useState(null);

            const isAvailable = (t) => !blockedSlots.find(b => b.date === date && b.time === t);

            if (!user) return (
                <div className="max-w-md mx-auto py-20 text-center space-y-6">
                    <div className="w-24 h-24 bg-pink-50 rounded-full flex items-center justify-center mx-auto text-4xl text-pink-500">🔒</div>
                    <h2 className="text-2xl font-bold">Тільки для клієнтів</h2>
                    <p className="text-stone-400">Увійдіть або зареєструйтесь, щоб отримати доступ до онлайн-бронювання</p>
                    <button onClick={onLogin} className="bg-pink-500 text-white px-8 py-3 rounded-xl font-bold">Авторизуватись</button>
                </div>
            );

            return (
                <div className="max-w-2xl mx-auto bg-white p-8 md:p-12 rounded-[3rem] shadow-sm border border-stone-100">
                    <div className="flex justify-between items-center mb-10">
                        {[1, 2, 3].map(i => (
                            <div key={i} className={`h-1.5 flex-1 rounded-full mx-1 ${step >= i ? 'bg-pink-500' : 'bg-stone-100'}`}></div>
                        ))}
                    </div>

                    {step === 1 && (
                        <div className="space-y-6 animate-in slide-in-from-right-4">
                            <h2 className="text-3xl font-black">Оберіть послугу</h2>
                            <div className="grid gap-4">
                                {SERVICES.map(s => (
                                    <div key={s.id} onClick={() => {setSelectedService(s); setStep(2);}} className="group flex items-center p-4 border-2 border-stone-100 rounded-3xl hover:border-pink-500 hover:bg-pink-50 transition cursor-pointer">
                                        <img src={s.img} className="w-20 h-20 rounded-2xl object-cover mr-4" />
                                        <div className="flex-1">
                                            <h4 className="font-bold text-lg">{s.name}</h4>
                                            <p className="text-stone-400 text-sm">{s.time}</p>
                                        </div>
                                        <div className="text-xl font-black text-pink-500">{s.price} ₴</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="space-y-8 animate-in slide-in-from-right-4 text-center">
                            <h2 className="text-3xl font-black text-left">Дата та час</h2>
                            <input type="date" value={date} min={new Date().toISOString().split('T')[0]} onChange={e => setDate(e.target.value)} className="w-full p-5 bg-stone-50 rounded-2xl border-none outline-none font-bold text-lg focus:ring-2 ring-pink-500" />
                            <div className="grid grid-cols-3 gap-3">
                                {TIME_SLOTS.map(t => (
                                    <button 
                                        key={t} 
                                        disabled={!isAvailable(t)}
                                        onClick={() => setTime(t)}
                                        className={`p-4 rounded-2xl font-bold transition ${!isAvailable(t) ? 'opacity-20 bg-stone-100 cursor-not-allowed' : time === t ? 'bg-pink-500 text-white scale-105' : 'bg-stone-50 hover:bg-pink-100'}`}
                                    >
                                        {t}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setStep(1)} className="flex-1 py-4 font-bold text-stone-400">Назад</button>
                                <button disabled={!time} onClick={() => setStep(3)} className="flex-[2] bg-stone-900 text-white py-4 rounded-2xl font-bold disabled:opacity-20">Далі</button>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="space-y-8 animate-in zoom-in-95 text-center">
                            <div className="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto text-3xl">✓</div>
                            <h2 className="text-3xl font-black">Підтвердження</h2>
                            <div className="bg-stone-50 p-8 rounded-[2rem] text-left space-y-4">
                                <div className="flex justify-between border-b pb-4"><span>Послуга:</span><span className="font-bold">{selectedService?.name}</span></div>
                                <div className="flex justify-between border-b pb-4"><span>Дата:</span><span className="font-bold">{date} о {time}</span></div>
                                <div className="flex justify-between"><span>Instagram:</span><span className="font-bold text-pink-500">@{profile.instagram || 'не вказано'}</span></div>
                            </div>
                            <p className="text-xs text-stone-400 italic">* Після підтвердження запис з'явиться у вашому кабінеті зі статусом "Очікує".</p>
                            <button onClick={() => onBook({service: selectedService.name, date, time, instagram: profile.instagram, userId: user.uid, userEmail: user.email})} className="w-full bg-pink-500 text-white py-5 rounded-2xl font-bold text-xl shadow-xl shadow-pink-100">Бронюю візит</button>
                            <button onClick={() => setStep(2)} className="text-stone-400 font-bold">Редагувати дані</button>
                        </div>
                    )}
                </div>
            );
        }

        function CabinetView({ user, profile, onUpdateProfile, appointments }) {
            const [ig, setIg] = useState(profile.instagram || '');
            return (
                <div className="grid md:grid-cols-3 gap-10 py-10">
                    <div className="md:col-span-1 space-y-8">
                        <div className="bg-white p-8 rounded-[2.5rem] border border-stone-100 shadow-sm text-center space-y-6">
                            <div className="w-32 h-32 mx-auto rounded-full bg-gradient-to-tr from-pink-500 to-purple-500 p-1">
                                <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} className="bg-white rounded-full p-2" />
                            </div>
                            <div>
                                <h3 className="text-xl font-bold">{user.email.split('@')[0]}</h3>
                                <p className="text-stone-400 text-sm">{user.email}</p>
                            </div>
                            <div className="space-y-3 pt-4 text-left">
                                <label className="text-xs font-black uppercase text-stone-400 ml-2">Мій Instagram</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 font-bold">@</span>
                                    <input value={ig} onChange={e => setIg(e.target.value)} className="w-full pl-10 pr-4 py-4 bg-stone-50 rounded-2xl border-none outline-none focus:ring-2 ring-pink-500 font-bold" />
                                </div>
                                <button onClick={() => onUpdateProfile({ instagram: ig })} className="w-full bg-stone-900 text-white py-3 rounded-xl text-sm font-bold">Зберегти профіль</button>
                            </div>
                        </div>
                    </div>
                    <div className="md:col-span-2 space-y-6">
                        <h2 className="text-3xl font-black">Історія візитів</h2>
                        {appointments.length === 0 ? (
                            <div className="h-64 flex items-center justify-center border-2 border-dashed border-stone-200 rounded-[2.5rem] text-stone-400 font-medium">Тут з'являться ваші записи</div>
                        ) : (
                            <div className="space-y-4">
                                {appointments.map(a => (
                                    <div key={a.id} className="bg-white p-6 rounded-3xl border border-stone-50 shadow-sm flex justify-between items-center group hover:border-pink-200 transition">
                                        <div className="flex gap-4 items-center">
                                            <div className={`w-3 h-3 rounded-full ${a.status==='confirmed'?'bg-green-500':'bg-yellow-400'}`}></div>
                                            <div>
                                                <div className="font-bold text-lg">{a.service}</div>
                                                <div className="text-stone-400 text-sm">{a.date} о {a.time}</div>
                                            </div>
                                        </div>
                                        <div className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider ${a.status==='confirmed'?'bg-green-50 text-green-600':'bg-yellow-50 text-yellow-600'}`}>
                                            {a.status === 'confirmed' ? 'Підтверджено' : 'Обробка'}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function AdminView({ appointments, blockedSlots, onToggleBlock, onUpdateStatus }) {
            const [tab, setTab] = useState('calendar');
            const dates = Array.from({length: 14}, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() + i);
                return d.toISOString().split('T')[0];
            });

            return (
                <div className="space-y-8 py-10">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                        <h2 className="text-4xl font-black text-purple-900">Admin Control</h2>
                        <div className="flex bg-stone-100 p-1.5 rounded-2xl">
                            <button onClick={() => setTab('calendar')} className={`px-6 py-2.5 rounded-xl text-sm font-bold transition ${tab==='calendar'?'bg-white shadow-sm text-purple-600':'text-stone-400'}`}>Календар</button>
                            <button onClick={() => setTab('schedule')} className={`px-6 py-2.5 rounded-xl text-sm font-bold transition ${tab==='schedule'?'bg-white shadow-sm text-purple-600':'text-stone-400'}`}>Розклад</button>
                            <button onClick={() => setTab('requests')} className={`px-6 py-2.5 rounded-xl text-sm font-bold transition ${tab==='requests'?'bg-white shadow-sm text-purple-600':'text-stone-400'}`}>Запити ({appointments.filter(a=>a.status==='pending').length})</button>
                        </div>
                    </div>

                    {tab === 'calendar' && (
                        <div className="grid md:grid-cols-2 gap-6 animate-in fade-in">
                            {dates.map(date => {
                                const dayApps = appointments.filter(a => a.date === date && a.status === 'confirmed');
                                return (
                                    <div key={date} className="bg-white p-6 rounded-[2rem] border shadow-sm">
                                        <div className="flex justify-between mb-4">
                                            <span className="font-black text-stone-400 uppercase tracking-tighter text-sm">{new Date(date).toLocaleDateString('uk-UA', {weekday: 'long', day: 'numeric', month: 'short'})}</span>
                                            <span className="bg-purple-100 text-purple-700 text-[10px] font-black px-2 py-1 rounded uppercase">{dayApps.length} записів</span>
                                        </div>
                                        <div className="space-y-3">
                                            {TIME_SLOTS.map(t => {
                                                const app = dayApps.find(a => a.time === t);
                                                return (
                                                    <div key={t} className={`p-3 rounded-xl border flex justify-between items-center ${app ? 'bg-purple-50 border-purple-100' : 'bg-stone-50 border-stone-100 opacity-40'}`}>
                                                        <span className="font-bold text-xs">{t}</span>
                                                        {app ? (
                                                            <div className="text-right">
                                                                <div className="text-xs font-black">@{app.instagram || 'anon'}</div>
                                                                <div className="text-[10px] text-stone-500">{app.service}</div>
                                                            </div>
                                                        ) : <span className="text-[10px] uppercase font-bold text-stone-300">вільно</span>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {tab === 'schedule' && (
                        <div className="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden p-8 animate-in slide-in-from-bottom-4">
                            <h3 className="text-xl font-bold mb-6">Управління доступністю</h3>
                            <p className="text-stone-400 text-sm mb-10 italic">Натисніть на слот, щоб закрити його для клієнтів (наприклад, для відпустки чи перерви)</p>
                            <div className="overflow-x-auto no-scrollbar">
                                <div className="min-w-[800px] flex gap-4">
                                    {dates.slice(0, 7).map(date => (
                                        <div key={date} className="flex-1 space-y-2">
                                            <div className="text-center font-black text-[10px] uppercase mb-4 h-10 flex flex-col items-center">
                                                <span>{new Date(date).toLocaleDateString('uk-UA', {day: 'numeric'})}</span>
                                                <span className="text-purple-400">{new Date(date).toLocaleDateString('uk-UA', {weekday: 'short'})}</span>
                                            </div>
                                            {TIME_SLOTS.map(t => {
                                                const isBlocked = blockedSlots.find(b => b.date === date && b.time === t);
                                                return (
                                                    <button key={t} onClick={() => onToggleBlock(date, t)} className={`w-full p-4 rounded-2xl text-[10px] font-black transition ${isBlocked ? 'bg-red-500 text-white' : 'bg-stone-50 hover:bg-stone-200 text-stone-400'}`}>
                                                        {isBlocked ? 'ЗАКРИТО' : t}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'requests' && (
                        <div className="space-y-4 animate-in fade-in">
                            {appointments.filter(a => a.status === 'pending').map(a => (
                                <div key={a.id} className="bg-white p-8 rounded-[2.5rem] border shadow-md flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="flex gap-6 items-center w-full md:w-auto">
                                        <div className="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center font-bold text-stone-300 uppercase">{a.userEmail[0]}</div>
                                        <div>
                                            <div className="font-black text-xl">{a.service}</div>
                                            <div className="text-stone-500 font-bold">{a.date} о {a.time}</div>
                                            <div className="text-pink-500 font-bold text-sm">Instagram: @{a.instagram || 'немає'}</div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 w-full md:w-auto">
                                        <button onClick={() => onUpdateStatus(a.id, 'confirmed')} className="flex-1 md:flex-none bg-green-500 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-green-100 hover:bg-green-600 transition">Прийняти</button>
                                        <button onClick={() => onUpdateStatus(a.id, 'rejected')} className="flex-1 md:flex-none bg-white border-2 text-red-500 px-8 py-4 rounded-2xl font-black hover:bg-red-50 transition">Відхилити</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function LoginModal({ onClose }) {
            const [isReg, setIsReg] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const submit = async (e) => {
                e.preventDefault();
                try {
                    if (isReg) await firebase.auth().createUserWithEmailAndPassword(email, pass);
                    else await firebase.auth().signInWithEmailAndPassword(email, pass);
                    onClose();
                } catch (e) { alert(e.message); }
            };

            return (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-xl flex items-center justify-center p-6 z-[200]">
                    <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-in zoom-in-95">
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-3xl font-black">{isReg ? 'Приєднуйся' : 'Вітаємо'}</h2>
                            <button onClick={onClose} className="text-stone-300 hover:text-stone-900">✕</button>
                        </div>
                        <form className="space-y-4" onSubmit={submit}>
                            <input placeholder="Email" required className="w-full p-5 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-pink-500 font-bold" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Пароль" required className="w-full p-5 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-pink-500 font-bold" value={pass} onChange={e => setPass(e.target.value)} />
                            <button className="w-full bg-pink-500 text-white py-5 rounded-2xl font-bold shadow-xl shadow-pink-100 mt-4">{isReg ? 'Створити акаунт' : 'Увійти'}</button>
                        </form>
                        <button onClick={() => setIsReg(!isReg)} className="w-full mt-6 text-xs text-stone-400 font-black uppercase tracking-widest hover:text-pink-500">
                            {isReg ? 'Вже маю акаунт' : 'Немає акаунту? Реєстрація'}
                        </button>
                    </div>
                </div>
            );
        }

        function ConfigError() {
            return (
                <div className="min-h-screen flex items-center justify-center p-6 text-center">
                    <div className="bg-white p-12 rounded-[3rem] shadow-xl max-w-md border border-red-50">
                        <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">!</div>
                        <h1 className="text-2xl font-black mb-4">Firebase не підключено</h1>
                        <p className="text-stone-500 mb-8">Будь ласка, вставте ваші <b>firebaseConfig</b> ключі у коді, щоб запустити систему.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
