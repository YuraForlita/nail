<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NailArt Elite - Studio OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@1,600&display=swap');
        
        :root { --primary: #f43f5e; --bg: #fafaf9; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg); 
            color: #1c1917; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden; /* Prevent horizontal scroll */
            width: 100%;
        }

        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5); 
        }

        /* Fix for mobile view and scrolling */
        .page-container {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDaE80NIYOWs7f9FZ2lxK_6dbocBsrgqmg",
            authDomain: "nail-e8a3c.firebaseapp.com",
            projectId: "nail-e8a3c",
            storageBucket: "nail-e8a3c.firebasestorage.app",
            messagingSenderId: "1064829438247",
            appId: "1:1064829438247:web:75278e58ed0c259d720102"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useEffect, useMemo, useRef } = React;
        const ADMIN_EMAIL = "admin@nail.com";

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [appointments, setAppointments] = useState([]);
            const [services, setServices] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [scheduleConfig, setScheduleConfig] = useState({});
            const [studioData, setStudioData] = useState({ 
                heroTitle: 'Elite Nail Art', 
                heroSub: 'Studio Boutique', 
                videoUrl: '', 
                gallery: [] 
            });
            const [loading, setLoading] = useState(true);
            const [showAuth, setShowAuth] = useState(false);

            // Auto-scroll to top on view change
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [view]);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        setIsAdmin(u.email === ADMIN_EMAIL);
                        db.collection("users").doc(u.uid).onSnapshot(doc => {
                            if (doc.exists) setProfile(doc.data());
                            else db.collection("users").doc(u.uid).set({ instagram: '', isBlacklisted: false, isVIP: false, vipTerms: '' });
                        });
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                        setProfile(null);
                    }
                    setLoading(false);
                });
                return unsub;
            }, []);

            useEffect(() => {
                const unsubApps = db.collection("appointments").onSnapshot(s => setAppointments(s.docs.map(d => ({id:d.id, ...d.data()}))));
                const unsubServ = db.collection("settings").doc("services").onSnapshot(d => d.exists && setServices(d.data().list || []));
                const unsubSched = db.collection("settings").doc("schedule").onSnapshot(d => d.exists && setScheduleConfig(d.data()));
                const unsubStudio = db.collection("settings").doc("studio").onSnapshot(d => d.exists && setStudioData(prev => ({...prev, ...d.data()})));
                
                let unsubUsers;
                if (user && user.email === ADMIN_EMAIL) {
                    unsubUsers = db.collection("users").onSnapshot(s => setUsersList(s.docs.map(d => ({uid: d.id, ...d.data()}))));
                }
                
                return () => { unsubApps(); unsubServ(); unsubSched(); unsubStudio(); unsubUsers && unsubUsers(); };
            }, [user]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-rose-500 animate-pulse uppercase tracking-tighter">Elite OS Loading...</div>;

            const handleNav = (v) => {
                if (!user && (v === 'cabinet' || v === 'admin' || v === 'booking')) {
                    setShowAuth(true);
                    return;
                }
                setView(v);
            };

            return (
                <div className="page-container min-h-screen flex flex-col">
                    <header className="sticky top-0 z-[100] h-20 bg-white/90 backdrop-blur-xl border-b border-stone-100 px-6 flex items-center justify-between">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                            <div className="w-10 h-10 bg-stone-900 text-white rounded-xl flex items-center justify-center font-black shadow-lg shadow-stone-200">N</div>
                            <span className="font-black text-lg uppercase tracking-tighter">NailArt <span className="text-rose-500">Elite</span></span>
                        </div>
                        <nav className="hidden lg:flex items-center gap-8">
                            <button onClick={() => handleNav('home')} className={`text-[11px] font-black uppercase tracking-widest transition-colors ${view==='home'?'text-rose-500 underline underline-offset-8':'text-stone-400 hover:text-stone-900'}`}>Головна</button>
                            <button onClick={() => handleNav('booking')} className={`text-[11px] font-black uppercase tracking-widest transition-colors ${view==='booking'?'text-rose-500 underline underline-offset-8':'text-stone-400 hover:text-stone-900'}`}>Запис</button>
                            {user && <button onClick={() => handleNav(isAdmin ? 'admin' : 'cabinet')} className={`text-[11px] font-black uppercase tracking-widest transition-colors ${['cabinet','admin'].includes(view)?'text-rose-500 underline underline-offset-8':'text-stone-400 hover:text-stone-900'}`}>Кабінет</button>}
                        </nav>
                        <div className="flex items-center gap-4">
                            {!user ? (
                                <button onClick={() => setShowAuth(true)} className="bg-stone-900 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">👤</button>
                            ) : (
                                <button onClick={() => auth.signOut()} className="text-[10px] font-black text-stone-300 hover:text-rose-500 transition-colors uppercase">Вихід</button>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 md:p-8 pb-32">
                        {view === 'home' && <HomeView setView={setView} services={services} studioData={studioData} />}
                        {view === 'booking' && <BookingView user={user} profile={profile} appointments={appointments} services={services} scheduleConfig={scheduleConfig} setView={setView} />}
                        {view === 'cabinet' && user && <CabinetView user={user} profile={profile} appointments={appointments} />}
                        {view === 'admin' && isAdmin && <AdminView appointments={appointments} services={services} usersList={usersList} scheduleConfig={scheduleConfig} studioData={studioData} />}
                    </main>

                    {/* Mobile Navigation */}
                    <div className="lg:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm glass rounded-[2.5rem] px-8 py-4 flex items-center justify-between shadow-2xl border border-white">
                        <button onClick={() => handleNav('home')} className={`text-2xl transition-all duration-300 ${view==='home'?'scale-125 text-rose-500 drop-shadow-sm':'opacity-30'}`}>🏠</button>
                        <button onClick={() => handleNav('booking')} className={`text-2xl transition-all duration-300 ${view==='booking'?'scale-125 text-rose-500 drop-shadow-sm':'opacity-30'}`}>🗓️</button>
                        <button onClick={() => handleNav(isAdmin ? 'admin' : 'cabinet')} className={`text-2xl transition-all duration-300 ${['cabinet','admin'].includes(view)?'scale-125 text-rose-500 drop-shadow-sm':'opacity-30'}`}>👤</button>
                    </div>

                    {showAuth && <AuthModal onClose={() => setShowAuth(false)} />}
                </div>
            );
        }

        function HomeView({ setView, services, studioData }) {
            return (
                <div className="space-y-20 animate-fade">
                    <section className="relative h-[550px] md:h-[650px] rounded-[3rem] overflow-hidden bg-stone-900 flex items-center p-6 md:p-20">
                        <div className="absolute inset-0 opacity-40">
                            <div className="absolute top-0 right-0 w-[40rem] h-[40rem] bg-rose-500/30 rounded-full blur-[120px]"></div>
                        </div>
                        <div className="relative z-10 max-w-3xl space-y-6">
                            <h1 className="text-4xl md:text-8xl font-black text-white leading-[1.1] tracking-tighter">
                                {studioData?.heroTitle} <br/> 
                                <span className="text-rose-500 font-serif italic lowercase font-normal">{studioData?.heroSub}</span>
                            </h1>
                            <div className="flex flex-col sm:flex-row gap-4 pt-6">
                                <button onClick={() => setView('booking')} className="bg-rose-500 text-white px-10 py-5 rounded-2xl font-black shadow-xl shadow-rose-900/40 hover:scale-105 transition-transform">Записатися онлайн</button>
                                {studioData?.videoUrl && (
                                    <a href={studioData.videoUrl} target="_blank" className="bg-white/10 text-white border border-white/20 px-10 py-5 rounded-2xl font-black hover:bg-white/20 transition-all text-center">Дивитись роботи</a>
                                )}
                            </div>
                        </div>
                    </section>

                    <section className="space-y-10">
                        <div className="flex items-center gap-4">
                            <h2 className="text-3xl md:text-5xl font-black tracking-tight">Послуги</h2>
                            <div className="h-px flex-1 bg-stone-100"></div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                            {services.map((s, i) => (
                                <div key={i} className="bg-white p-8 rounded-[2.5rem] border border-stone-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all">
                                    <p className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-2">{s.category || 'Nail Design'}</p>
                                    <h3 className="text-xl font-black mb-1">{s.name}</h3>
                                    <p className="text-stone-400 font-bold mb-6">{s.price} ₴ • {s.duration || '1.5 год'}</p>
                                    <button onClick={() => setView('booking')} className="w-full py-3 bg-stone-50 text-stone-900 font-black text-xs uppercase rounded-xl hover:bg-stone-900 hover:text-white transition-colors">Обрати</button>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        }

        function BookingView({ user, profile, appointments, services, scheduleConfig, setView }) {
            const [step, setStep] = useState(1);
            const [selService, setSelService] = useState(null);
            const [selDate, setSelDate] = useState('');
            const [selTime, setSelTime] = useState('');

            if (profile?.isBlacklisted) return <div className="text-center py-20 font-black text-rose-500">Ваш доступ обмежено адміністратором.</div>;

            const today = new Date().toISOString().split('T')[0];
            const isTaken = (t) => appointments.some(a => a.date === selDate && a.time === t && ['confirmed','pending'].includes(a.status));
            const availableSlots = scheduleConfig[selDate] || ["09:00", "11:30", "14:00", "16:30", "19:00"];

            const handleFinalize = async () => {
                if (!profile?.instagram) {
                    alert("Будь ласка, вкажіть ваш Instagram у профілі!");
                    setView('cabinet');
                    return;
                }
                await db.collection("appointments").add({
                    userId: user.uid,
                    userEmail: user.email,
                    instagram: profile.instagram,
                    service: selService.name,
                    price: selService.price,
                    date: selDate,
                    time: selTime,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });
                setView('cabinet');
            };

            return (
                <div className="max-w-2xl mx-auto animate-fade px-2">
                    <div className="flex justify-between mb-12 relative px-10">
                        <div className="absolute top-1/2 left-0 w-full h-px bg-stone-200 -z-10"></div>
                        {[1, 2, 3].map(i => (
                            <div key={i} className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-sm transition-all duration-500 ${step >= i ? 'bg-rose-500 text-white shadow-xl scale-110' : 'bg-white text-stone-300 border border-stone-100'}`}>{i}</div>
                        ))}
                    </div>

                    <div className="bg-white p-6 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] shadow-2xl shadow-stone-200/50 border border-stone-100">
                        {step === 1 && (
                            <div className="space-y-8">
                                <h2 className="text-2xl md:text-4xl font-black tracking-tighter">Яку процедуру бажаєте?</h2>
                                <div className="grid gap-4">
                                    {services.map(s => (
                                        <button key={s.id} onClick={() => {setSelService(s); setStep(2);}} className="p-6 rounded-2xl bg-stone-50 border-2 border-transparent hover:border-rose-300 hover:bg-white text-left transition-all group active:scale-95">
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <p className="font-black text-lg group-hover:text-rose-500 transition-colors">{s.name}</p>
                                                    <p className="text-stone-400 font-bold text-sm uppercase">{s.duration || '1.5 год'}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black text-xl">{s.price} ₴</p>
                                                </div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {step === 2 && (
                            <div className="space-y-8">
                                <h2 className="text-2xl md:text-4xl font-black tracking-tighter">Коли Вам зручно?</h2>
                                
                                <div className="space-y-3 relative">
                                    <label className="text-[10px] font-black uppercase text-rose-500 tracking-widest ml-1">1. Виберіть дату</label>
                                    <div className="relative group">
                                        <input 
                                            type="date" 
                                            min={today} 
                                            value={selDate} 
                                            onChange={e => setSelDate(e.target.value)} 
                                            className="w-full p-6 bg-stone-100 rounded-2xl font-black text-lg border-2 border-transparent focus:border-rose-500 outline-none transition-all appearance-none cursor-pointer" 
                                        />
                                        <div className="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-2xl">📅</div>
                                        {!selDate && <div className="absolute inset-0 flex items-center px-6 pointer-events-none text-stone-400 font-bold italic">Натисніть для вибору дати...</div>}
                                    </div>
                                </div>

                                {selDate && (
                                    <div className="space-y-3 animate-fade">
                                        <label className="text-[10px] font-black uppercase text-rose-500 tracking-widest ml-1">2. Виберіть час</label>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                            {availableSlots.map(t => (
                                                <button key={t} disabled={isTaken(t)} onClick={() => setSelTime(t)} className={`p-5 rounded-2xl font-black text-sm transition-all ${isTaken(t)?'opacity-20 bg-stone-100 cursor-not-allowed':selTime===t?'bg-rose-500 text-white shadow-xl shadow-rose-200 scale-105':'bg-stone-50 hover:bg-stone-200'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="flex gap-4 pt-4">
                                    <button onClick={() => setStep(1)} className="flex-1 p-5 font-black text-stone-400 uppercase text-xs tracking-widest">Назад</button>
                                    <button disabled={!selTime} onClick={() => setStep(3)} className="flex-[2] bg-stone-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest disabled:opacity-30 shadow-xl shadow-stone-200">Далі</button>
                                </div>
                            </div>
                        )}
                        {step === 3 && (
                            <div className="space-y-10 text-center animate-fade">
                                <h2 className="text-3xl md:text-5xl font-black tracking-tighter">Перевіримо?</h2>
                                <div className="bg-stone-50 p-8 rounded-[2.5rem] text-left space-y-5 border border-stone-100">
                                    <div className="flex justify-between items-center border-b border-stone-200 pb-4"><span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">Послуга</span><span className="font-black text-lg">{selService.name}</span></div>
                                    <div className="flex justify-between items-center border-b border-stone-200 pb-4"><span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">Дата</span><span className="font-black text-lg">{selDate}</span></div>
                                    <div className="flex justify-between items-center"><span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">Час</span><span className="font-black text-2xl text-rose-500">{selTime}</span></div>
                                </div>
                                <button onClick={handleFinalize} className="w-full bg-rose-500 text-white py-7 rounded-[2rem] font-black text-xl shadow-2xl shadow-rose-200 active:scale-95 transition-all uppercase tracking-tighter">Записатися</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function CabinetView({ user, profile, appointments }) {
            const [ig, setIg] = useState(profile?.instagram || '');
            const myApps = appointments.filter(a => a.userId === user.uid).sort((a,b) => new Date(b.date) - new Date(a.date));

            return (
                <div className="grid lg:grid-cols-3 gap-10 animate-fade">
                    <div className="space-y-6">
                        <div className="bg-white p-10 rounded-[3rem] shadow-xl shadow-stone-200/50 border border-stone-50 h-fit space-y-8">
                            <div className="w-24 h-24 bg-stone-900 text-white rounded-[2.5rem] flex items-center justify-center text-4xl font-black mx-auto shadow-xl shadow-stone-300 transform -rotate-3">{user.email[0].toUpperCase()}</div>
                            <div className="text-center space-y-1">
                                <h3 className="font-black text-xl truncate px-4">{user.email}</h3>
                                {profile?.isVIP && <span className="inline-block bg-amber-100 text-amber-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest animate-pulse border border-amber-200">⭐ VIP Клієнт</span>}
                            </div>
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-stone-400 uppercase ml-2 tracking-widest">Мій Instagram</label>
                                    <input value={ig} onChange={e => setIg(e.target.value.replace('@',''))} className="w-full p-5 bg-stone-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none transition-all" placeholder="username" />
                                    <p className="text-[10px] text-stone-400 font-medium px-2 leading-relaxed mt-2 italic">Будь ласка, вкажіть діючий нік, щоб ми могли зв'язатися з Вами.</p>
                                </div>
                                <button onClick={async () => {
                                    await db.collection("users").doc(user.uid).update({instagram: ig});
                                    alert("Збережено!");
                                }} className="w-full bg-stone-900 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-stone-200">Оновити</button>
                            </div>
                        </div>

                        {profile?.isVIP && profile?.vipTerms && (
                            <div className="bg-gradient-to-br from-amber-50 to-amber-100 p-8 rounded-[2.5rem] border border-amber-200 space-y-3 shadow-sm">
                                <p className="text-[10px] font-black text-amber-600 uppercase tracking-widest">Мої VIP привілеї</p>
                                <p className="text-sm font-bold text-stone-800 leading-relaxed whitespace-pre-line">{profile.vipTerms}</p>
                            </div>
                        )}
                    </div>

                    <div className="lg:col-span-2 space-y-8">
                        <div className="flex items-center gap-4">
                            <h2 className="text-3xl md:text-5xl font-black tracking-tighter">Мій розклад</h2>
                            <div className="h-px flex-1 bg-stone-100"></div>
                        </div>
                        <div className="grid gap-4">
                            {myApps.length > 0 ? myApps.map(a => (
                                <div key={a.id} className="bg-white p-8 rounded-[2.5rem] border border-stone-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 group hover:border-rose-200 shadow-sm transition-all">
                                    <div>
                                        <p className="font-black text-xl group-hover:text-rose-500 transition-colors">{a.service}</p>
                                        <p className="text-xs font-bold text-stone-400 uppercase tracking-widest mt-1">{a.date} • {a.time}</p>
                                    </div>
                                    <div className={`px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest ${a.status==='confirmed'?'bg-emerald-100 text-emerald-600':a.status==='rejected'?'bg-rose-50 text-rose-300':'bg-stone-100 text-stone-500'}`}>
                                        {a.status === 'confirmed' ? 'Підтверджено' : a.status === 'pending' ? 'В обробці' : 'Відхилено'}
                                    </div>
                                </div>
                            )) : (
                                <div className="text-center py-24 bg-white rounded-[3rem] border-4 border-dashed border-stone-50">
                                    <p className="text-stone-300 font-bold text-xl">Записів ще не було</p>
                                    <button onClick={() => window.location.reload()} className="mt-4 text-rose-500 font-black uppercase text-xs">Записатись зараз</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function AdminView({ appointments, services, usersList, scheduleConfig, studioData }) {
            const [tab, setTab] = useState('daily');
            const [selUser, setSelUser] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            
            const [editStudio, setEditStudio] = useState(studioData);
            useEffect(() => { setEditStudio(studioData); }, [studioData]);

            const updateStatus = (id, s) => db.collection("appointments").doc(id).update({status: s});
            const toggleUserFlag = (uid, field, current) => db.collection("users").doc(uid).update({[field]: !current});
            const saveVipTerms = (uid, terms) => db.collection("users").doc(uid).update({vipTerms: terms});

            const filteredUsers = useMemo(() => {
                return usersList.filter(u => 
                    (u.instagram?.toLowerCase().includes(searchTerm.toLowerCase())) || 
                    (u.email?.toLowerCase().includes(searchTerm.toLowerCase()))
                );
            }, [usersList, searchTerm]);

            return (
                <div className="space-y-10 animate-fade">
                    {/* Admin Navigation Fix */}
                    <div className="flex flex-wrap bg-stone-100 p-2 rounded-[2rem] gap-2 mx-auto max-w-full overflow-x-hidden justify-center">
                        {[
                            {id: 'daily', label: 'Розклад', icon: '📅'},
                            {id: 'users', label: 'Клієнти', icon: '👥'},
                            {id: 'services', label: 'Прайс', icon: '💰'},
                            {id: 'studio', label: 'Студія', icon: '🏠'}
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 min-w-[100px] px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${tab===t.id?'bg-white text-stone-900 shadow-xl':'text-stone-400 hover:text-stone-600'}`}>
                                <span className="mr-2">{t.icon}</span>{t.label}
                            </button>
                        ))}
                    </div>

                    {tab === 'daily' && (
                        <div className="grid lg:grid-cols-2 gap-10">
                            <div className="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-xl border border-stone-50 space-y-8">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-3xl font-black tracking-tighter">Денний план</h3>
                                    <div className="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 font-black">!</div>
                                </div>
                                <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full p-5 bg-stone-50 rounded-2xl font-black border-none shadow-inner" />
                                <div className="space-y-4">
                                    {(scheduleConfig[date] || ["09:00","11:30","14:00","16:30","19:00"]).map(t => {
                                        const app = appointments.find(a => a.date === date && a.time === t && a.status !== 'rejected');
                                        return (
                                            <div key={t} className={`p-6 rounded-3xl border transition-all ${app?'bg-stone-900 text-white shadow-2xl shadow-stone-300 scale-[1.03]':'bg-stone-50 border-stone-100'}`}>
                                                <div className="flex justify-between items-center">
                                                    <span className="font-black text-xl">{t}</span>
                                                    {app ? (
                                                        <div className="text-right">
                                                            <p className="text-[10px] font-black uppercase text-rose-400 tracking-widest">{app.service}</p>
                                                            <button onClick={()=>setSelUser(usersList.find(u=>u.uid===app.userId))} className="font-bold hover:text-rose-300 transition-colors">@{app.instagram} →</button>
                                                        </div>
                                                    ) : (
                                                        <span className="text-[10px] font-black text-stone-300 uppercase tracking-widest">Вільний слот</span>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            
                            <div className="space-y-8">
                                <h3 className="text-3xl font-black tracking-tighter">Нові запити ({appointments.filter(a=>a.status==='pending').length})</h3>
                                <div className="grid gap-4">
                                    {appointments.filter(a=>a.status==='pending').map(a => (
                                        <div key={a.id} className="bg-white p-8 rounded-[2.5rem] border-2 border-rose-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 shadow-xl shadow-rose-50 transform hover:scale-[1.02] transition-transform">
                                            <div>
                                                <p className="font-black text-2xl tracking-tighter">{a.service}</p>
                                                <p className="text-xs font-bold text-stone-400 uppercase tracking-widest mt-1">{a.date} • {a.time} • @{a.instagram}</p>
                                            </div>
                                            <div className="flex gap-2 w-full sm:w-auto">
                                                <button onClick={()=>updateStatus(a.id, 'confirmed')} className="flex-1 sm:flex-none bg-rose-500 text-white px-8 py-3.5 rounded-2xl font-black text-[10px] uppercase shadow-xl shadow-rose-200">Прийняти</button>
                                                <button onClick={()=>updateStatus(a.id, 'rejected')} className="bg-stone-100 text-stone-400 px-4 rounded-2xl font-black">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                    {appointments.filter(a=>a.status==='pending').length === 0 && <p className="text-stone-300 italic text-center py-20 font-bold">Немає нових запитів</p>}
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'users' && (
                        <div className="space-y-10 animate-fade">
                            <div className="max-w-xl mx-auto relative group">
                                <input 
                                    value={searchTerm} 
                                    onChange={e=>setSearchTerm(e.target.value)} 
                                    className="w-full p-6 bg-white rounded-[2rem] border-2 border-transparent focus:border-rose-500 outline-none shadow-xl shadow-stone-100 font-black text-lg transition-all"
                                    placeholder="Пошук (Instagram або Email)..."
                                />
                                <div className="absolute right-8 top-1/2 -translate-y-1/2 text-stone-300 text-2xl group-focus-within:text-rose-500 transition-colors">🔍</div>
                            </div>

                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredUsers.map(u => (
                                    <div key={u.uid} className="bg-white p-10 rounded-[3rem] border border-stone-100 shadow-sm hover:shadow-2xl transition-all space-y-8 relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 w-24 h-24 bg-rose-50 rounded-bl-[5rem] -mr-12 -mt-12 group-hover:scale-150 transition-transform duration-700"></div>
                                        <div className="relative z-10 flex justify-between items-start">
                                            <div>
                                                <p className="font-black text-2xl tracking-tighter">@{u.instagram || 'Анонім'}</p>
                                                <p className="text-[10px] text-stone-400 font-bold uppercase tracking-widest mt-1">{u.email}</p>
                                            </div>
                                            <div className="flex flex-col gap-1 items-end">
                                                {u.isVIP && <span className="text-[9px] bg-amber-100 text-amber-600 px-3 py-1.5 rounded-lg font-black uppercase tracking-widest">VIP</span>}
                                            </div>
                                        </div>
                                        <button onClick={()=>setSelUser(u)} className="w-full bg-stone-900 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-500 transition-colors relative z-10 shadow-xl shadow-stone-200">Переглянути профіль</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'services' && (
                        <div className="max-w-2xl mx-auto bg-white p-10 md:p-16 rounded-[4rem] border shadow-2xl shadow-stone-100 space-y-12">
                            <h3 className="text-4xl font-black tracking-tighter text-center">Прайс-лист</h3>
                            <div className="space-y-4">
                                {services.map((s, idx) => (
                                    <div key={idx} className="flex justify-between items-center p-6 bg-stone-50 rounded-3xl group hover:bg-white border border-transparent hover:border-rose-100 transition-all">
                                        <div className="flex items-center gap-4">
                                            <div className="w-2 h-2 rounded-full bg-rose-500"></div>
                                            <div>
                                                <p className="font-black text-lg">{s.name}</p>
                                                <p className="text-xs font-bold text-rose-400">{s.price} ₴</p>
                                            </div>
                                        </div>
                                        <button onClick={async ()=>{
                                            const newList = services.filter((_, i) => i !== idx);
                                            await db.collection("settings").doc("services").set({list: newList});
                                        }} className="text-stone-300 hover:text-rose-500 transition-colors p-2">✕</button>
                                    </div>
                                ))}
                            </div>
                            <div className="pt-10 border-t space-y-4">
                                <p className="text-[10px] font-black text-rose-500 uppercase tracking-[0.2em] text-center mb-6">Додати нову послугу</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <input id="new-serv-name" placeholder="Назва" className="p-5 bg-stone-50 rounded-2xl outline-none font-bold border focus:border-rose-200" />
                                    <input id="new-serv-price" type="number" placeholder="Ціна" className="p-5 bg-stone-50 rounded-2xl outline-none font-bold border focus:border-rose-200" />
                                </div>
                                <button onClick={async ()=>{
                                    const n = document.getElementById('new-serv-name').value;
                                    const p = document.getElementById('new-serv-price').value;
                                    if(!n || !p) return;
                                    await db.collection("settings").doc("services").set({list: [...services, {id:Date.now().toString(), name:n, price:Number(p), category:'Elite', duration:'1.5 год'}]}, {merge:true});
                                    document.getElementById('new-serv-name').value = '';
                                    document.getElementById('new-serv-price').value = '';
                                }} className="w-full bg-stone-900 text-white py-5 rounded-2xl font-black shadow-2xl shadow-stone-200 uppercase tracking-widest hover:scale-[1.02] transition-transform">Додати до прайсу</button>
                            </div>
                        </div>
                    )}

                    {tab === 'studio' && (
                        <div className="max-w-2xl mx-auto bg-white p-10 md:p-16 rounded-[4rem] border shadow-2xl shadow-stone-100 space-y-10 animate-fade">
                            <h3 className="text-4xl font-black tracking-tighter text-center">Дизайн Студії</h3>
                            <div className="space-y-8">
                                <div className="space-y-3">
                                    <label className="text-[10px] font-black uppercase text-stone-400 ml-3 tracking-[0.2em]">Головний заголовок</label>
                                    <input value={editStudio.heroTitle} onChange={e=>setEditStudio({...editStudio, heroTitle: e.target.value})} className="w-full p-6 bg-stone-50 rounded-3xl outline-none border-2 border-transparent focus:border-rose-500 font-black text-xl shadow-inner" />
                                </div>
                                <div className="space-y-3">
                                    <label className="text-[10px] font-black uppercase text-stone-400 ml-3 tracking-[0.2em]">Підзаголовок</label>
                                    <input value={editStudio.heroSub} onChange={e=>setEditStudio({...editStudio, heroSub: e.target.value})} className="w-full p-6 bg-stone-50 rounded-3xl outline-none border-2 border-transparent focus:border-rose-500 font-serif italic text-2xl shadow-inner" />
                                </div>
                                <div className="space-y-3">
                                    <label className="text-[10px] font-black uppercase text-stone-400 ml-3 tracking-[0.2em]">Посилання на роботи (Instagram/URL)</label>
                                    <input value={editStudio.videoUrl} onChange={e=>setEditStudio({...editStudio, videoUrl: e.target.value})} className="w-full p-6 bg-stone-50 rounded-3xl outline-none border-2 border-transparent focus:border-rose-500 font-bold shadow-inner" placeholder="https://..." />
                                </div>
                                <button onClick={async ()=>{
                                    await db.collection("settings").doc("studio").set(editStudio);
                                    alert("Дані оновлено!");
                                }} className="w-full bg-rose-500 text-white py-6 rounded-3xl font-black shadow-2xl shadow-rose-200 text-lg uppercase tracking-widest hover:scale-[1.02] transition-transform">Зберегти налаштування</button>
                            </div>
                        </div>
                    )}

                    {/* Client Profile Modal - Completely Fixed Responsive Design */}
                    {selUser && (
                        <div className="fixed inset-0 bg-stone-900/90 backdrop-blur-xl z-[200] flex items-center justify-center p-0 sm:p-4 animate-fade">
                            <div className="bg-white w-full h-full sm:h-auto sm:max-w-4xl sm:rounded-[4rem] relative flex flex-col shadow-2xl overflow-hidden">
                                
                                {/* Header */}
                                <div className="p-8 sm:p-12 border-b border-stone-100 flex justify-between items-center bg-stone-50/50">
                                    <div className="flex items-center gap-6">
                                        <div className="w-16 h-16 bg-stone-900 text-white rounded-[1.5rem] flex items-center justify-center text-3xl font-black">@</div>
                                        <div>
                                            <h2 className="text-3xl font-black tracking-tighter">@{selUser.instagram}</h2>
                                            <p className="text-stone-400 font-bold uppercase text-[10px] tracking-widest">{selUser.email}</p>
                                        </div>
                                    </div>
                                    <button onClick={()=>setSelUser(null)} className="w-12 h-12 rounded-full bg-white border border-stone-100 flex items-center justify-center text-xl font-black text-stone-300 hover:text-stone-900 shadow-sm transition-colors">✕</button>
                                </div>

                                {/* Content Grid */}
                                <div className="flex-1 overflow-y-auto p-8 sm:p-12 space-y-12 no-scrollbar">
                                    <div className="grid md:grid-cols-2 gap-12">
                                        {/* VIP Section */}
                                        <div className="space-y-8">
                                            <div className="flex items-center justify-between">
                                                <p className="text-[10px] font-black uppercase text-rose-500 tracking-[0.2em]">Управління VIP</p>
                                                {selUser.isVIP && <span className="bg-amber-100 text-amber-600 px-3 py-1 rounded-full text-[8px] font-black uppercase">Active VIP</span>}
                                            </div>
                                            
                                            <div className="space-y-4">
                                                <button 
                                                    onClick={async () => {
                                                        const newVal = !selUser.isVIP;
                                                        await toggleUserFlag(selUser.uid, 'isVIP', selUser.isVIP);
                                                        setSelUser(prev => ({...prev, isVIP: newVal}));
                                                    }} 
                                                    className={`w-full py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition-all duration-300 border-2 ${selUser.isVIP ? 'bg-amber-50 border-amber-500 text-amber-600' : 'bg-stone-50 border-transparent text-stone-400 hover:bg-stone-100'}`}
                                                >
                                                    {selUser.isVIP ? 'Скасувати статус VIP ⭐' : 'Зробити VIP Клієнтом ✨'}
                                                </button>

                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black text-stone-400 uppercase tracking-widest ml-1">Індивідуальні умови</label>
                                                    <textarea 
                                                        defaultValue={selUser.vipTerms} 
                                                        onBlur={(e)=>saveVipTerms(selUser.uid, e.target.value)}
                                                        placeholder="Опишіть знижки або бонуси для цього клієнта..."
                                                        className="w-full p-6 bg-stone-50 rounded-3xl border-2 border-transparent focus:border-amber-400 outline-none min-h-[180px] font-bold text-sm shadow-inner transition-all"
                                                    />
                                                    <p className="text-[9px] text-stone-400 italic px-2">Ці умови з'являться в особистому кабінеті клієнта.</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* History Section */}
                                        <div className="space-y-8">
                                            <p className="text-[10px] font-black uppercase text-stone-400 tracking-[0.2em] border-b border-stone-100 pb-3">Історія візитів</p>
                                            <div className="space-y-3">
                                                {appointments.filter(a=>a.userId===selUser.uid).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(a => (
                                                    <div key={a.id} className="p-5 bg-stone-50 rounded-3xl flex justify-between items-center group">
                                                        <div>
                                                            <p className="font-black text-sm group-hover:text-rose-500 transition-colors">{a.service}</p>
                                                            <p className="text-[9px] font-bold text-stone-400 uppercase tracking-widest">{a.date} | {a.time}</p>
                                                        </div>
                                                        <span className={`text-[8px] font-black uppercase px-3 py-1.5 rounded-full ${a.status==='confirmed'?'bg-emerald-100 text-emerald-600':'bg-stone-200 text-stone-500'}`}>{a.status}</span>
                                                    </div>
                                                ))}
                                                {appointments.filter(a=>a.userId===selUser.uid).length === 0 && (
                                                    <div className="text-center py-20 bg-stone-50 rounded-3xl">
                                                        <p className="text-stone-300 font-bold italic">Записів ще не було</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function AuthModal({ onClose }) {
            const [isReg, setIsReg] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                try {
                    if(isReg) await auth.createUserWithEmailAndPassword(email, pass);
                    else await auth.signInWithEmailAndPassword(email, pass);
                    onClose();
                } catch(e) { alert("Помилка: " + e.message); }
            };

            return (
                <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-fade">
                    <div className="bg-white w-full max-w-sm rounded-[3.5rem] p-12 shadow-2xl relative overflow-hidden border border-white/50">
                        <div className="absolute top-0 left-0 w-full h-2 bg-rose-500 shadow-lg shadow-rose-200"></div>
                        <button onClick={onClose} className="absolute top-10 right-10 text-stone-300 font-black hover:text-stone-900 transition-colors">✕</button>
                        <h2 className="text-4xl font-black mb-10 tracking-tighter">{isReg ? 'Elite Club' : 'Вхід'}</h2>
                        <form className="space-y-5" onSubmit={handleAuth}>
                            <input type="email" placeholder="Електронна пошта" required className="w-full p-5 bg-stone-50 rounded-2xl outline-none font-bold border focus:border-rose-200 transition-all" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Пароль" required className="w-full p-5 bg-stone-50 rounded-2xl outline-none font-bold border focus:border-rose-200 transition-all" value={pass} onChange={e => setPass(e.target.value)} />
                            <button className="w-full bg-stone-900 text-white py-5 rounded-2xl font-black shadow-2xl shadow-stone-300 hover:scale-[1.02] active:scale-95 transition-all text-sm uppercase tracking-widest">{isReg ? 'Зареєструватись' : 'Продовжити'}</button>
                        </form>
                        <button onClick={() => setIsReg(!isReg)} className="w-full mt-8 text-[9px] font-black text-stone-300 uppercase tracking-[0.2em] hover:text-stone-900 transition-colors">{isReg ? 'Вже є акаунт? Увійти' : 'Вперше у нас? Створити акаунт'}</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
