<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailArt Studio - Firebase Booking</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase App (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <!-- Firebase Auth (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <!-- Firebase Firestore (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-stone-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-stone-400">Завантаження додатка...</p>
        </div>
    </div>

    <script type="text/babel">
        // --- ВСТАВТЕ ВАШІ ДАНІ СЮДИ ---
        const firebaseConfig = {
        apiKey: "AIzaSyDaE80NIYOWs7f9FZ2lxK_6dbocBsrgqmg",
        authDomain: "nail-e8a3c.firebaseapp.com",
        projectId: "nail-e8a3c",
        storageBucket: "nail-e8a3c.firebasestorage.app",
        messagingSenderId: "1064829438247",
        appId: "1:1064829438247:web:75278e58ed0c259d720102",
        measurementId: "G-SSVYQB90HH"
        };

        // Перевірка конфігурації
        const isConfigEmpty = firebaseConfig.apiKey.includes("ВАШ_");

        // Ініціалізація Firebase (через Compat API для стабільності в браузері)
        let auth, db;
        if (!isConfigEmpty) {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        }

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [view, setView] = useState('home');
            const [appointments, setAppointments] = useState([]);
            const [toast, setToast] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);

            if (isConfigEmpty) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6">
                        <div className="bg-white p-8 rounded-3xl shadow-xl border border-red-100 max-w-md text-center">
                            <h1 className="text-xl font-bold text-red-600 mb-4">Потрібно підключити Firebase</h1>
                            <p className="text-stone-600">Вставте ваші ключі (apiKey, projectId тощо) у блок <b>firebaseConfig</b> всередині коду.</p>
                        </div>
                    </div>
                );
            }

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setIsAdmin(u?.email === 'admin@nail.com');
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection("appointments")
                    .onSnapshot((snapshot) => {
                        const apps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        const filtered = isAdmin ? apps : apps.filter(a => a.userId === user.uid);
                        setAppointments(filtered);
                    });
                return () => unsubscribe();
            }, [user, isAdmin]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleAuth = async (email, password, isReg) => {
                try {
                    if (isReg) {
                        await auth.createUserWithEmailAndPassword(email, password);
                        showToast('Реєстрація успішна!');
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                        showToast('Вхід успішний!');
                    }
                    setShowLoginModal(false);
                } catch (e) {
                    showToast(e.message, 'error');
                }
            };

            const createBooking = async (data) => {
                try {
                    await db.collection("appointments").add({
                        ...data,
                        status: 'pending',
                        createdAt: new Date().toISOString()
                    });
                    showToast('Записано!');
                    setView('cabinet');
                } catch (e) {
                    showToast('Помилка запису', 'error');
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b px-6 py-4 flex justify-between items-center">
                        <div className="text-2xl font-serif font-bold text-pink-500 cursor-pointer" onClick={() => setView('home')}>NailArt</div>
                        <div className="flex gap-4 items-center">
                            <button onClick={() => setView('booking')} className="text-sm font-semibold">Запис</button>
                            <button onClick={() => setView('cabinet')} className="text-sm font-semibold">Кабінет</button>
                            {isAdmin && <button onClick={() => setView('admin')} className="text-sm font-bold text-purple-600">Адмін</button>}
                            {!user ? (
                                <button onClick={() => setShowLoginModal(true)} className="bg-stone-900 text-white px-4 py-2 rounded-xl text-xs font-bold">Вхід</button>
                            ) : (
                                <button onClick={() => auth.signOut()} className="text-xs text-stone-400">Вихід</button>
                            )}
                        </div>
                    </nav>

                    <main className="flex-1 max-w-4xl mx-auto w-full p-6">
                        {view === 'home' && (
                            <div className="text-center py-20 space-y-8 animate-in fade-in duration-700">
                                <h1 className="text-6xl font-serif font-bold">Ідеальний манікюр<br/><span className="text-pink-500 italic">для тебе</span></h1>
                                <button onClick={() => setView('booking')} className="bg-pink-500 text-white px-12 py-4 rounded-full font-bold text-xl shadow-xl shadow-pink-100 hover:scale-105 transition">Записатись</button>
                            </div>
                        )}

                        {view === 'booking' && (
                            <div className="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-sm border space-y-6">
                                <h2 className="text-2xl font-bold font-serif">Новий запис</h2>
                                <BookingForm user={user} onSubmit={createBooking} onLogin={() => setShowLoginModal(true)} />
                            </div>
                        )}

                        {view === 'cabinet' && <CabinetView appointments={appointments} user={user} />}
                        {view === 'admin' && <AdminView appointments={appointments} updateStatus={(id, s) => db.collection("appointments").doc(id).update({status: s})} />}
                    </main>

                    {showLoginModal && <LoginModal onClose={() => setShowLoginModal(false)} onAuth={handleAuth} />}
                    
                    {toast && (
                        <div className={`fixed bottom-6 right-6 p-4 rounded-2xl shadow-xl text-white font-bold z-50 ${toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'}`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        function BookingForm({ user, onSubmit, onLogin }) {
            const [service, setService] = useState('Манікюр');
            const [date, setDate] = useState('');
            if (!user) return <div className="text-center py-4"><button onClick={onLogin} className="text-pink-500 font-bold">Увійдіть, щоб обрати час</button></div>;
            return (
                <div className="space-y-4">
                    <select className="w-full p-4 border-2 rounded-2xl" value={service} onChange={e => setService(e.target.value)}>
                        <option>Манікюр</option>
                        <option>Гель-лак</option>
                        <option>Нарощування</option>
                    </select>
                    <input type="date" className="w-full p-4 border-2 rounded-2xl" value={date} onChange={e => setDate(e.target.value)} />
                    <button onClick={() => onSubmit({service, date, userId: user.uid, userEmail: user.email})} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-lg">Підтвердити</button>
                </div>
            );
        }

        function CabinetView({ appointments, user }) {
            if (!user) return <div className="text-center py-10">Будь ласка, увійдіть.</div>;
            return (
                <div className="space-y-4">
                    <h2 className="text-3xl font-bold font-serif">Ваші записи</h2>
                    {appointments.length === 0 ? <p className="text-stone-400">Записів ще немає.</p> : appointments.map(a => (
                        <div key={a.id} className="bg-white p-6 rounded-2xl border flex justify-between items-center shadow-sm">
                            <div>
                                <div className="font-bold text-lg">{a.service}</div>
                                <div className="text-stone-500">{a.date}</div>
                            </div>
                            <div className={`px-4 py-1 rounded-full text-xs font-bold uppercase ${a.status === 'confirmed' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{a.status}</div>
                        </div>
                    ))}
                </div>
            );
        }

        function AdminView({ appointments, updateStatus }) {
            return (
                <div className="space-y-4">
                    <h2 className="text-3xl font-bold text-purple-700 font-serif">Управління</h2>
                    {appointments.map(a => (
                        <div key={a.id} className="bg-white p-6 rounded-2xl border flex justify-between items-center shadow-md">
                            <div>
                                <div className="font-bold">{a.service}</div>
                                <div className="text-xs text-stone-500">{a.userEmail} | {a.date}</div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => updateStatus(a.id, 'confirmed')} className="bg-green-500 text-white px-4 py-2 rounded-xl text-xs font-bold">ОК</button>
                                <button onClick={() => updateStatus(a.id, 'rejected')} className="bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-bold">X</button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function LoginModal({ onClose, onAuth }) {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [isReg, setIsReg] = useState(false);
            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
                        <h2 className="text-2xl font-bold mb-6 font-serif">{isReg ? 'Реєстрація' : 'Вхід'}</h2>
                        <input placeholder="Email" className="w-full p-4 bg-stone-50 border rounded-2xl mb-3 outline-none focus:border-pink-500" value={email} onChange={e => setEmail(e.target.value)} />
                        <input type="password" placeholder="Пароль" className="w-full p-4 bg-stone-50 border rounded-2xl mb-6 outline-none focus:border-pink-500" value={pass} onChange={e => setPass(e.target.value)} />
                        <button onClick={() => onAuth(email, pass, isReg)} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-100 mb-4">{isReg ? 'Створити' : 'Увійти'}</button>
                        <button onClick={() => setIsReg(!isReg)} className="w-full text-xs text-stone-400 font-bold hover:text-pink-500 uppercase tracking-widest">{isReg ? 'Вже є акаунт? Увійти' : 'Немає акаунту? Реєстрація'}</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
