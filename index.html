<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailArt Elite - Studio OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@1,600&display=swap');
        
        :root { --primary: #f43f5e; --bg: #fafaf9; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: #1c1917; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Mobile adjustment for booking window */
        .booking-container { max-height: 85vh; overflow-y: auto; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDaE80NIYOWs7f9FZ2lxK_6dbocBsrgqmg",
            authDomain: "nail-e8a3c.firebaseapp.com",
            projectId: "nail-e8a3c",
            storageBucket: "nail-e8a3c.firebasestorage.app",
            messagingSenderId: "1064829438247",
            appId: "1:1064829438247:web:75278e58ed0c259d720102"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useEffect, useMemo } = React;
        const ADMIN_EMAIL = "admin@nail.com";

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [appointments, setAppointments] = useState([]);
            const [services, setServices] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [scheduleConfig, setScheduleConfig] = useState({});
            const [studioData, setStudioData] = useState({ heroTitle: '', heroSub: '', videoUrl: '', gallery: [] });
            const [loading, setLoading] = useState(true);
            const [showAuth, setShowAuth] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        setIsAdmin(u.email === ADMIN_EMAIL);
                        db.collection("users").doc(u.uid).onSnapshot(doc => {
                            if (doc.exists) setProfile(doc.data());
                            else db.collection("users").doc(u.uid).set({ instagram: '', isBlacklisted: false, isVIP: false, vipTerms: '' });
                        });
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                        setProfile(null);
                    }
                    setLoading(false);
                });
                return unsub;
            }, []);

            useEffect(() => {
                const unsubApps = db.collection("appointments").onSnapshot(s => setAppointments(s.docs.map(d => ({id:d.id, ...d.data()}))));
                const unsubServ = db.collection("settings").doc("services").onSnapshot(d => d.exists && setServices(d.data().list || []));
                const unsubSched = db.collection("settings").doc("schedule").onSnapshot(d => d.exists && setScheduleConfig(d.data()));
                const unsubStudio = db.collection("settings").doc("studio").onSnapshot(d => d.exists && setStudioData(d.data()));
                
                let unsubUsers;
                if (user && user.email === ADMIN_EMAIL) {
                    unsubUsers = db.collection("users").onSnapshot(s => setUsersList(s.docs.map(d => ({uid: d.id, ...d.data()}))));
                }
                
                return () => { unsubApps(); unsubServ(); unsubSched(); unsubStudio(); unsubUsers && unsubUsers(); };
            }, [user]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-rose-500 animate-pulse uppercase tracking-tighter">Elite OS Loading...</div>;

            const handleNav = (v) => {
                if (!user && (v === 'cabinet' || v === 'admin' || v === 'booking')) {
                    setShowAuth(true);
                    return;
                }
                setView(v);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-[100] h-20 bg-white/80 backdrop-blur-xl border-b border-stone-100 px-6 flex items-center justify-between">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                            <div className="w-10 h-10 bg-stone-900 text-white rounded-xl flex items-center justify-center font-black">N</div>
                            <span className="font-black text-lg uppercase tracking-tighter">NailArt <span className="text-rose-500">Elite</span></span>
                        </div>
                        <nav className="hidden lg:flex items-center gap-8">
                            <button onClick={() => handleNav('home')} className={`text-[11px] font-black uppercase tracking-widest ${view==='home'?'text-rose-500':'text-stone-400'}`}>Головна</button>
                            <button onClick={() => handleNav('booking')} className={`text-[11px] font-black uppercase tracking-widest ${view==='booking'?'text-rose-500':'text-stone-400'}`}>Запис</button>
                            {user && <button onClick={() => handleNav(isAdmin ? 'admin' : 'cabinet')} className={`text-[11px] font-black uppercase tracking-widest ${['cabinet','admin'].includes(view)?'text-rose-500':'text-stone-400'}`}>Кабінет</button>}
                        </nav>
                        <div className="flex items-center gap-4">
                            {!user ? (
                                <button onClick={() => setShowAuth(true)} className="bg-stone-900 text-white w-10 h-10 rounded-full flex items-center justify-center">👤</button>
                            ) : (
                                <button onClick={() => auth.signOut()} className="text-[10px] font-black text-stone-300 hover:text-rose-500 transition-colors uppercase">Вихід</button>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 md:p-8 pb-32">
                        {view === 'home' && <HomeView setView={setView} services={services} studioData={studioData} />}
                        {view === 'booking' && <BookingView user={user} profile={profile} appointments={appointments} services={services} scheduleConfig={scheduleConfig} setView={setView} />}
                        {view === 'cabinet' && user && <CabinetView user={user} profile={profile} appointments={appointments} />}
                        {view === 'admin' && isAdmin && <AdminView appointments={appointments} services={services} usersList={usersList} scheduleConfig={scheduleConfig} studioData={studioData} />}
                    </main>

                    <div className="lg:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm glass rounded-[2rem] px-8 py-4 flex items-center justify-between shadow-2xl border border-white">
                        <button onClick={() => handleNav('home')} className={`text-2xl ${view==='home'?'scale-125 text-rose-500':'opacity-40'}`}>🏠</button>
                        <button onClick={() => handleNav('booking')} className={`text-2xl ${view==='booking'?'scale-125 text-rose-500':'opacity-40'}`}>🗓️</button>
                        <button onClick={() => handleNav(isAdmin ? 'admin' : 'cabinet')} className={`text-2xl ${['cabinet','admin'].includes(view)?'scale-125 text-rose-500':'opacity-40'}`}>👤</button>
                    </div>

                    {showAuth && <AuthModal onClose={() => setShowAuth(false)} />}
                </div>
            );
        }

        function HomeView({ setView, services, studioData }) {
            return (
                <div className="space-y-20 animate-fade">
                    <section className="relative h-[550px] md:h-[650px] rounded-[3rem] overflow-hidden bg-stone-900 flex items-center p-6 md:p-20">
                        <div className="absolute inset-0 opacity-30">
                            <div className="absolute top-0 right-0 w-96 h-96 bg-rose-500 rounded-full blur-[120px]"></div>
                        </div>
                        <div className="relative z-10 max-w-3xl space-y-6">
                            <h1 className="text-4xl md:text-8xl font-black text-white leading-tight tracking-tighter">
                                {studioData?.heroTitle || "Elite Nail Art"} <br/> 
                                <span className="text-rose-500 font-serif italic lowercase font-normal">{studioData?.heroSub || "Studio Boutique"}</span>
                            </h1>
                            <div className="flex flex-col sm:flex-row gap-4 pt-6">
                                <button onClick={() => setView('booking')} className="bg-rose-500 text-white px-10 py-5 rounded-2xl font-black shadow-xl shadow-rose-900/20 hover:scale-105 transition">Записатися онлайн</button>
                                {studioData?.videoUrl && (
                                    <a href={studioData.videoUrl} target="_blank" className="bg-white/10 text-white border border-white/20 px-10 py-5 rounded-2xl font-black hover:bg-white/20 transition text-center">Наші роботи</a>
                                )}
                            </div>
                        </div>
                    </section>

                    <section className="space-y-10">
                        <h2 className="text-3xl md:text-4xl font-black tracking-tight">Послуги студії</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                            {services.map((s, i) => (
                                <div key={i} className="bg-white p-8 rounded-[2.5rem] border border-stone-100 shadow-sm hover:shadow-xl transition-all">
                                    <p className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-2">{s.category}</p>
                                    <h3 className="text-xl font-black mb-1">{s.name}</h3>
                                    <p className="text-stone-400 font-bold mb-6">{s.price} ₴ • {s.duration}</p>
                                    <button onClick={() => setView('booking')} className="text-stone-900 font-black text-xs uppercase border-b-2 border-rose-500 pb-1">Забронювати</button>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        }

        function BookingView({ user, profile, appointments, services, scheduleConfig, setView }) {
            const [step, setStep] = useState(1);
            const [selService, setSelService] = useState(null);
            const [selDate, setSelDate] = useState('');
            const [selTime, setSelTime] = useState('');

            if (profile?.isBlacklisted) return <div className="text-center py-20 font-black text-rose-500">Ваш доступ обмежено адміністратором.</div>;

            const today = new Date().toISOString().split('T')[0];
            const isTaken = (t) => appointments.some(a => a.date === selDate && a.time === t && ['confirmed','pending'].includes(a.status));
            const availableSlots = scheduleConfig[selDate] || ["09:00", "11:30", "14:00", "16:30", "19:00"];

            const handleFinalize = async () => {
                if (!profile?.instagram) {
                    alert("Спочатку вкажіть ваш Instagram у профілі!");
                    setView('cabinet');
                    return;
                }
                await db.collection("appointments").add({
                    userId: user.uid,
                    userEmail: user.email,
                    instagram: profile.instagram,
                    service: selService.name,
                    price: selService.price,
                    date: selDate,
                    time: selTime,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });
                setView('cabinet');
            };

            return (
                <div className="max-w-2xl mx-auto animate-fade">
                    <div className="flex justify-between mb-8 px-4">
                        {[1, 2, 3].map(i => (
                            <div key={i} className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-xs transition-colors ${step >= i ? 'bg-rose-500 text-white shadow-lg' : 'bg-stone-200 text-stone-400'}`}>{i}</div>
                        ))}
                    </div>

                    <div className="bg-white p-6 md:p-12 rounded-[2.5rem] md:rounded-[3rem] shadow-xl border border-stone-100 booking-container">
                        {step === 1 && (
                            <div className="space-y-6">
                                <h2 className="text-2xl md:text-3xl font-black">Оберіть послугу</h2>
                                <div className="grid gap-3">
                                    {services.map(s => (
                                        <button key={s.id} onClick={() => {setSelService(s); setStep(2);}} className="p-6 rounded-2xl border-2 border-stone-50 hover:border-rose-200 text-left transition-all group">
                                            <p className="font-black text-lg group-hover:text-rose-500 transition-colors">{s.name}</p>
                                            <p className="text-stone-400 font-bold">{s.price} ₴</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {step === 2 && (
                            <div className="space-y-8">
                                <h2 className="text-2xl md:text-3xl font-black">Дата та час</h2>
                                <input type="date" min={today} value={selDate} onChange={e => setSelDate(e.target.value)} className="w-full p-5 bg-stone-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none" />
                                {selDate && (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                        {availableSlots.map(t => (
                                            <button key={t} disabled={isTaken(t)} onClick={() => setSelTime(t)} className={`p-4 rounded-xl font-black text-xs transition-all ${isTaken(t)?'opacity-20 bg-stone-100 line-through':selTime===t?'bg-rose-500 text-white shadow-lg shadow-rose-200':'bg-stone-50 hover:bg-rose-100'}`}>{t}</button>
                                        ))}
                                    </div>
                                )}
                                <div className="flex gap-4">
                                    <button onClick={() => setStep(1)} className="flex-1 p-5 font-black text-stone-400">Назад</button>
                                    <button disabled={!selTime} onClick={() => setStep(3)} className="flex-[2] bg-stone-900 text-white py-5 rounded-2xl font-black disabled:opacity-30">Продовжити</button>
                                </div>
                            </div>
                        )}
                        {step === 3 && (
                            <div className="space-y-8 text-center">
                                <h2 className="text-3xl font-black">Фіналізація</h2>
                                <div className="bg-stone-50 p-8 rounded-[2rem] text-left space-y-4 border border-stone-100">
                                    <div className="flex justify-between items-center border-b pb-4"><span className="text-xs font-black text-stone-400 uppercase">Послуга</span><span className="font-black">{selService.name}</span></div>
                                    <div className="flex justify-between items-center border-b pb-4"><span className="text-xs font-black text-stone-400 uppercase">Дата</span><span className="font-black">{selDate}</span></div>
                                    <div className="flex justify-between items-center"><span className="text-xs font-black text-stone-400 uppercase">Час</span><span className="font-black text-rose-500">{selTime}</span></div>
                                </div>
                                <button onClick={handleFinalize} className="w-full bg-rose-500 text-white py-6 rounded-3xl font-black text-xl shadow-xl shadow-rose-100 active:scale-95 transition-transform">Підтвердити запис</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function CabinetView({ user, profile, appointments }) {
            const [ig, setIg] = useState(profile?.instagram || '');
            const myApps = appointments.filter(a => a.userId === user.uid).sort((a,b) => new Date(b.date) - new Date(a.date));

            return (
                <div className="grid lg:grid-cols-3 gap-10 animate-fade">
                    <div className="space-y-6">
                        <div className="glass p-10 rounded-[3rem] h-fit space-y-8">
                            <div className="w-20 h-20 bg-stone-900 text-white rounded-[2rem] flex items-center justify-center text-3xl font-black mx-auto">{user.email[0].toUpperCase()}</div>
                            <div className="text-center space-y-1">
                                <h3 className="font-black text-lg truncate px-4">{user.email}</h3>
                                {profile?.isVIP && <span className="inline-block bg-amber-100 text-amber-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest animate-pulse">⭐ VIP Client</span>}
                            </div>
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-stone-400 uppercase ml-2 tracking-widest">Мій Instagram</label>
                                    <input value={ig} onChange={e => setIg(e.target.value.replace('@',''))} className="w-full p-4 bg-stone-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none" placeholder="username" />
                                    <p className="text-[9px] text-stone-400 font-medium px-2 leading-relaxed">Вводьте свою реальну інформацію, щоб спеціаліст міг зв'язатися з Вами для підтвердження або уточнення деталей.</p>
                                </div>
                                <button onClick={async () => {
                                    await db.collection("users").doc(user.uid).update({instagram: ig});
                                    alert("Дані збережено!");
                                }} className="w-full bg-stone-900 text-white py-4 rounded-2xl font-black text-sm">Зберегти профіль</button>
                            </div>
                        </div>

                        {profile?.isVIP && profile?.vipTerms && (
                            <div className="bg-gradient-to-br from-amber-50 to-orange-50 p-8 rounded-[2.5rem] border border-amber-100 space-y-3">
                                <p className="text-[10px] font-black text-amber-600 uppercase tracking-widest">Персональні умови VIP</p>
                                <p className="text-sm font-bold text-stone-700 leading-relaxed whitespace-pre-line">{profile.vipTerms}</p>
                            </div>
                        )}
                    </div>

                    <div className="lg:col-span-2 space-y-6">
                        <h2 className="text-3xl md:text-4xl font-black">Мій розклад</h2>
                        <div className="grid gap-4">
                            {myApps.length > 0 ? myApps.map(a => (
                                <div key={a.id} className="bg-white p-6 rounded-3xl border border-stone-100 flex justify-between items-center group hover:border-rose-200 transition-all">
                                    <div>
                                        <p className="font-black text-lg group-hover:text-rose-500 transition-colors">{a.service}</p>
                                        <p className="text-xs font-bold text-stone-400 uppercase">{a.date} о {a.time}</p>
                                    </div>
                                    <div className={`px-4 py-2 rounded-full text-[10px] font-black uppercase ${a.status==='confirmed'?'bg-green-100 text-green-600':a.status==='rejected'?'bg-red-50 text-red-300':'bg-stone-50 text-stone-400'}`}>
                                        {a.status === 'confirmed' ? 'Підтверджено' : a.status === 'pending' ? 'В обробці' : 'Відхилено'}
                                    </div>
                                </div>
                            )) : (
                                <div className="text-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-stone-100">
                                    <p className="text-stone-300 font-bold">Ви ще не записувалися</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function AdminView({ appointments, services, usersList, scheduleConfig, studioData }) {
            const [tab, setTab] = useState('daily');
            const [selUser, setSelUser] = useState(null);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            
            // Local state for editing studio
            const [editStudio, setEditStudio] = useState(studioData);
            useEffect(() => { setEditStudio(studioData); }, [studioData]);

            const updateStatus = (id, s) => db.collection("appointments").doc(id).update({status: s});
            const toggleUserFlag = (uid, field, current) => db.collection("users").doc(uid).update({[field]: !current});
            const saveVipTerms = async (uid, terms) => db.collection("users").doc(uid).update({vipTerms: terms});

            return (
                <div className="space-y-10 animate-fade">
                    <div className="flex bg-stone-100 p-1.5 rounded-2xl w-fit gap-1 mx-auto overflow-x-auto no-scrollbar">
                        {['daily', 'users', 'services', 'studio'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={`px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${tab===t?'bg-white text-stone-900 shadow-md':'text-stone-400'}`}>
                                {t==='daily'?'Розклад':t==='users'?'Клієнти':t==='services'?'Прайс':'Студія'}
                            </button>
                        ))}
                    </div>

                    {tab === 'daily' && (
                        <div className="grid lg:grid-cols-2 gap-10">
                            <div className="bg-white p-8 rounded-[3rem] shadow-sm border space-y-6">
                                <h3 className="text-2xl font-black">Управління Днем</h3>
                                <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full p-4 bg-stone-50 rounded-2xl font-bold border-none" />
                                <div className="space-y-3">
                                    {(scheduleConfig[date] || ["09:00","11:30","14:00","16:30","19:00"]).map(t => {
                                        const app = appointments.find(a => a.date === date && a.time === t && a.status !== 'rejected');
                                        return (
                                            <div key={t} className={`p-5 rounded-2xl border flex justify-between items-center transition-all ${app?'bg-stone-900 text-white shadow-xl shadow-stone-200 scale-[1.02]':'bg-stone-50 border-stone-100'}`}>
                                                <span className="font-black">{t}</span>
                                                {app ? (
                                                    <div className="text-right">
                                                        <p className="text-xs font-black uppercase text-rose-400">{app.service}</p>
                                                        <button onClick={()=>setSelUser(usersList.find(u=>u.uid===app.userId))} className="text-[10px] font-bold opacity-60 hover:opacity-100 transition-opacity">@{app.instagram} →</button>
                                                        {app.status === 'pending' && (
                                                            <div className="flex gap-2 mt-2">
                                                                <button onClick={()=>updateStatus(app.id, 'confirmed')} className="bg-green-500 text-white px-3 py-1.5 rounded-lg text-[8px] font-black">Прийняти</button>
                                                                <button onClick={()=>updateStatus(app.id, 'rejected')} className="bg-white/20 text-white px-3 py-1.5 rounded-lg text-[8px] font-black">Відхилити</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                ) : (
                                                    <span className="text-[10px] font-black text-stone-300 uppercase">Вільний слот</span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="space-y-6">
                                <h3 className="text-2xl font-black">В очікуванні ({appointments.filter(a=>a.status==='pending').length})</h3>
                                {appointments.filter(a=>a.status==='pending').map(a => (
                                    <div key={a.id} className="bg-white p-6 rounded-3xl border-2 border-rose-100 flex justify-between items-center shadow-sm">
                                        <div>
                                            <p className="font-black text-lg">{a.service}</p>
                                            <p className="text-xs font-bold text-stone-400 uppercase tracking-tighter">{a.date} о {a.time} • @{a.instagram}</p>
                                        </div>
                                        <button onClick={()=>updateStatus(a.id, 'confirmed')} className="bg-rose-500 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-rose-100">Прийняти</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'users' && (
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {usersList.map(u => (
                                <div key={u.uid} className="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-6">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="font-black text-xl">@{u.instagram || 'Анонім'}</p>
                                            <p className="text-[10px] text-stone-400 font-bold truncate max-w-[150px] uppercase">{u.email}</p>
                                        </div>
                                        <div className="flex flex-col gap-1 items-end">
                                            {u.isVIP && <span className="text-[8px] bg-amber-100 text-amber-600 px-2 py-1 rounded font-black uppercase">VIP</span>}
                                            {u.isBlacklisted && <span className="text-[8px] bg-red-100 text-red-600 px-2 py-1 rounded font-black uppercase">Blacklist</span>}
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setSelUser(u)} className="flex-1 bg-stone-100 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-stone-200 transition">Історія & VIP</button>
                                        <button onClick={()=>toggleUserFlag(u.uid, 'isBlacklisted', u.isBlacklisted)} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-colors ${u.isBlacklisted?'bg-green-100 text-green-600':'bg-red-50 text-red-500'}`}>
                                            {u.isBlacklisted?'Unblock':'Block'}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'services' && (
                        <div className="max-w-2xl mx-auto bg-white p-10 rounded-[3rem] border shadow-sm space-y-8">
                            <h3 className="text-2xl font-black">Редактор прайсу</h3>
                            <div className="space-y-3">
                                {services.map((s, idx) => (
                                    <div key={idx} className="flex justify-between items-center p-5 bg-stone-50 rounded-2xl group border border-transparent hover:border-rose-100">
                                        <div>
                                            <p className="font-black">{s.name}</p>
                                            <p className="text-xs font-bold text-rose-500">{s.price} ₴</p>
                                        </div>
                                        <button onClick={async ()=>{
                                            const newList = services.filter((_, i) => i !== idx);
                                            await db.collection("settings").doc("services").set({list: newList});
                                        }} className="text-stone-300 hover:text-rose-500 transition-colors">✕</button>
                                    </div>
                                ))}
                            </div>
                            <div className="pt-6 border-t space-y-4">
                                <input id="new-serv-name" placeholder="Назва послуги" className="w-full p-4 bg-stone-50 rounded-xl outline-none border focus:border-rose-200" />
                                <input id="new-serv-price" type="number" placeholder="Ціна ₴" className="w-full p-4 bg-stone-50 rounded-xl outline-none border focus:border-rose-200" />
                                <button onClick={async ()=>{
                                    const n = document.getElementById('new-serv-name').value;
                                    const p = document.getElementById('new-serv-price').value;
                                    if(!n || !p) return;
                                    await db.collection("settings").doc("services").set({list: [...services, {id:Date.now().toString(), name:n, price:Number(p), category:'Elite', duration:'1.5 год'}]}, {merge:true});
                                    document.getElementById('new-serv-name').value = '';
                                    document.getElementById('new-serv-price').value = '';
                                }} className="w-full bg-stone-900 text-white py-4 rounded-xl font-black shadow-lg">Додати нову послугу</button>
                            </div>
                        </div>
                    )}

                    {tab === 'studio' && (
                        <div className="max-w-2xl mx-auto bg-white p-10 rounded-[3rem] border shadow-sm space-y-8">
                            <h3 className="text-2xl font-black">Конструктор Студії</h3>
                            <div className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-stone-400 ml-2">Головний заголовок</label>
                                    <input value={editStudio.heroTitle} onChange={e=>setEditStudio({...editStudio, heroTitle: e.target.value})} className="w-full p-4 bg-stone-50 rounded-2xl outline-none border border-transparent focus:border-rose-500 font-bold" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-stone-400 ml-2">Підзаголовок (курсив)</label>
                                    <input value={editStudio.heroSub} onChange={e=>setEditStudio({...editStudio, heroSub: e.target.value})} className="w-full p-4 bg-stone-50 rounded-2xl outline-none border border-transparent focus:border-rose-500 font-bold" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-stone-400 ml-2">Посилання на роботи (IG/Video)</label>
                                    <input value={editStudio.videoUrl} onChange={e=>setEditStudio({...editStudio, videoUrl: e.target.value})} className="w-full p-4 bg-stone-50 rounded-2xl outline-none border border-transparent focus:border-rose-500 font-bold" placeholder="https://..." />
                                </div>
                                <button onClick={async ()=>{
                                    await db.collection("settings").doc("studio").set(editStudio);
                                    alert("Студію оновлено!");
                                }} className="w-full bg-rose-500 text-white py-5 rounded-2xl font-black shadow-xl shadow-rose-100">Опублікувати зміни</button>
                            </div>
                        </div>
                    )}

                    {selUser && (
                        <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] p-10 relative max-h-[90vh] overflow-y-auto shadow-2xl">
                                <button onClick={()=>setSelUser(null)} className="absolute top-8 right-8 text-stone-300 font-black text-2xl">✕</button>
                                
                                <div className="flex items-center gap-6 mb-10">
                                    <div className="w-16 h-16 bg-stone-900 text-white rounded-[1.5rem] flex items-center justify-center text-2xl font-black">@</div>
                                    <div>
                                        <h2 className="text-3xl font-black">@{selUser.instagram}</h2>
                                        <p className="text-stone-400 font-bold uppercase text-[10px]">{selUser.email}</p>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-10">
                                    <div className="space-y-6">
                                        <p className="text-[10px] font-black uppercase text-stone-400 border-b pb-2 tracking-widest">Управління VIP</p>
                                        <div className="flex items-center gap-3">
                                            <button onClick={()=>toggleUserFlag(selUser.uid, 'isVIP', selUser.isVIP)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${selUser.isVIP?'bg-amber-100 text-amber-600 border-amber-200 border':'bg-stone-50 text-stone-400'}`}>
                                                {selUser.isVIP ? 'Скасувати VIP' : 'Зробити VIP'}
                                            </button>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-stone-400 uppercase">Умови лояльності клієнта</label>
                                            <textarea 
                                                defaultValue={selUser.vipTerms} 
                                                onBlur={(e)=>saveVipTerms(selUser.uid, e.target.value)}
                                                placeholder="Напр: 5-й візит -10%, VIP-знижка 5% на все..."
                                                className="w-full p-4 bg-stone-50 rounded-2xl border-none outline-none min-h-[120px] font-bold text-sm"
                                            />
                                            <p className="text-[9px] text-stone-300 italic">Цей текст клієнт побачить у своєму кабінеті</p>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black uppercase text-stone-400 border-b pb-2 tracking-widest">Історія візитів</p>
                                        <div className="space-y-2">
                                            {appointments.filter(a=>a.userId===selUser.uid).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(a => (
                                                <div key={a.id} className="p-4 bg-stone-50 rounded-2xl flex justify-between items-center border border-stone-100">
                                                    <div>
                                                        <p className="font-black text-sm">{a.service}</p>
                                                        <p className="text-[9px] font-bold text-stone-400 uppercase">{a.date} | {a.time}</p>
                                                    </div>
                                                    <span className={`text-[8px] font-black uppercase px-2 py-1 rounded ${a.status==='confirmed'?'bg-green-100 text-green-600':'bg-stone-200 text-stone-500'}`}>{a.status}</span>
                                                </div>
                                            ))}
                                            {appointments.filter(a=>a.userId===selUser.uid).length === 0 && <p className="text-stone-300 italic text-center py-10 font-bold">Записів ще не було</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function AuthModal({ onClose }) {
            const [isReg, setIsReg] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                try {
                    if(isReg) await auth.createUserWithEmailAndPassword(email, pass);
                    else await auth.signInWithEmailAndPassword(email, pass);
                    onClose();
                } catch(e) { alert("Помилка: " + e.message); }
            };

            return (
                <div className="fixed inset-0 bg-stone-900/70 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-fade">
                    <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-rose-500"></div>
                        <button onClick={onClose} className="absolute top-8 right-8 text-stone-300 font-black">✕</button>
                        <h2 className="text-3xl font-black mb-8 tracking-tighter">{isReg ? 'Elite Club' : 'Вхід'}</h2>
                        <form className="space-y-4" onSubmit={handleAuth}>
                            <input type="email" placeholder="Email" required className="w-full p-4 bg-stone-50 rounded-2xl outline-none font-bold" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Пароль" required className="w-full p-4 bg-stone-50 rounded-2xl outline-none font-bold" value={pass} onChange={e => setPass(e.target.value)} />
                            <button className="w-full bg-stone-900 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-black transition-colors">{isReg ? 'Реєстрація' : 'Увійти'}</button>
                        </form>
                        <button onClick={() => setIsReg(!isReg)} className="w-full mt-6 text-[10px] font-black text-stone-300 uppercase tracking-widest">{isReg ? 'Вже є акаунт? Увійти' : 'Вперше у нас? Створити акаунт'}</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
