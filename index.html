<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailArt Studio Pro - Advanced</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfcfb; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIG ---
        const firebaseConfig = {
        apiKey: "AIzaSyDaE80NIYOWs7f9FZ2lxK_6dbocBsrgqmg",
        authDomain: "nail-e8a3c.firebaseapp.com",
        projectId: "nail-e8a3c",
        storageBucket: "nail-e8a3c.firebasestorage.app",
        messagingSenderId: "1064829438247",
        appId: "1:1064829438247:web:75278e58ed0c259d720102",
        measurementId: "G-SSVYQB90HH"
        };
        const isConfigReady = firebaseConfig.apiKey !== "";
        if (isConfigReady) firebase.initializeApp(firebaseConfig);

        const { useState, useEffect, useMemo } = React;

        const DEFAULT_TIME_SLOTS = ["09:00", "11:00", "13:00", "15:00", "17:00", "19:00"];
        const ADMIN_EMAIL = "admin@nail.com"; 

        const SERVICES = [
            { id: 1, name: "Естетичний манікюр", price: 500 },
            { id: 2, name: "Покриття гель-лаком", price: 750 },
            { id: 3, name: "Нарощування нігтів", price: 1100 }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ instagram: '' });
            const [isAdmin, setIsAdmin] = useState(false);
            const [view, setView] = useState('home'); 
            const [appointments, setAppointments] = useState([]);
            const [customSchedule, setCustomSchedule] = useState({}); // { "2023-10-25": ["10:00", "12:00"] }
            const [loading, setLoading] = useState(true);
            const [showLogin, setShowLogin] = useState(false);

            useEffect(() => {
                if (!isConfigReady) return;
                const unsubscribe = firebase.auth().onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        setIsAdmin(u.email === ADMIN_EMAIL);
                        const doc = await firebase.firestore().collection("users").doc(u.uid).get();
                        if (doc.exists) setProfile(doc.data());
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                        setProfile({ instagram: '' });
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !isConfigReady) return;
                const db = firebase.firestore();
                
                const unsubApps = db.collection("appointments").onSnapshot(snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setAppointments(data);
                });

                const unsubSchedule = db.collection("settings").doc("custom_schedule").onSnapshot(doc => {
                    if (doc.exists) setCustomSchedule(doc.data());
                });

                return () => { unsubApps(); unsubSchedule(); };
            }, [user]);

            if (!isConfigReady) return <div className="p-20 text-center">Налаштуйте Firebase Config</div>;
            if (loading) return <div className="h-screen flex items-center justify-center font-black animate-pulse text-pink-500">NailArt Pro...</div>;

            return (
                <div className="min-h-screen pb-20">
                    <nav className="sticky top-0 z-50 glass border-b border-stone-100 px-6 h-20 flex items-center justify-between">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                            <div className="w-10 h-10 bg-pink-500 rounded-xl flex items-center justify-center text-white font-bold">N</div>
                            <span className="text-xl font-black tracking-tighter uppercase">NailArt <span className="text-pink-500 font-serif lowercase italic font-normal">pro</span></span>
                        </div>

                        <div className="hidden md:flex items-center gap-8 text-[10px] font-black uppercase tracking-widest">
                            <button onClick={() => setView('home')} className={view==='home'?'text-pink-500':'text-stone-400'}>Головна</button>
                            <button onClick={() => setView('booking')} className={view==='booking'?'text-pink-500':'text-stone-400'}>Запис</button>
                            {user && !isAdmin && <button onClick={() => setView('cabinet')} className={view==='cabinet'?'text-pink-500':'text-stone-400'}>Кабінет</button>}
                            {isAdmin && <button onClick={() => setView('admin')} className="bg-stone-900 text-white px-4 py-2 rounded-lg">Адмін Панель</button>}
                        </div>

                        <div className="flex items-center gap-4">
                            {!user ? (
                                <button onClick={() => setShowLogin(true)} className="bg-pink-500 text-white px-6 py-2 rounded-full font-bold text-sm">Вхід</button>
                            ) : (
                                <button onClick={() => firebase.auth().signOut()} className="text-stone-400 hover:text-red-500 transition font-black text-[10px] uppercase">Вихід</button>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6">
                        {view === 'home' && <HomeView setView={setView} />}
                        {view === 'booking' && (
                            <BookingView 
                                user={user} 
                                profile={profile} 
                                appointments={appointments}
                                customSchedule={customSchedule}
                                onBook={async (data) => {
                                    await firebase.firestore().collection("appointments").add({...data, status: 'pending', createdAt: new Date().toISOString()});
                                    setView('cabinet');
                                }}
                                onOpenLogin={() => setShowLogin(true)}
                            />
                        )}
                        {view === 'cabinet' && user && (
                            <CabinetView 
                                user={user} 
                                profile={profile} 
                                appointments={appointments.filter(a => a.userId === user.uid)}
                                onUpdateProfile={async (data) => {
                                    // Перевірка на унікальність ніку
                                    const snapshot = await firebase.firestore().collection("users").where("instagram", "==", data.instagram).get();
                                    if (!snapshot.empty && snapshot.docs[0].id !== user.uid) {
                                        alert("Цей Instagram вже використовується іншим клієнтом!");
                                        return;
                                    }
                                    await firebase.firestore().collection("users").doc(user.uid).set(data, {merge: true});
                                    setProfile(data);
                                    alert("Профіль оновлено!");
                                }}
                            />
                        )}
                        {view === 'admin' && isAdmin && (
                            <AdminPanel 
                                appointments={appointments} 
                                customSchedule={customSchedule}
                                onUpdateStatus={(id, s) => firebase.firestore().collection("appointments").doc(id).update({status: s})}
                                onUpdateSchedule={async (date, slots) => {
                                    await firebase.firestore().collection("settings").doc("custom_schedule").set({ [date]: slots }, {merge: true});
                                }}
                            />
                        )}
                    </main>

                    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
                </div>
            );
        }

        // --- VIEWS ---

        function HomeView({ setView }) {
            return (
                <div className="py-20 text-center space-y-8">
                    <h1 className="text-7xl font-black leading-none">Твоя ідеальна <br/><span className="text-pink-500 font-serif italic">краса</span> тут</h1>
                    <p className="max-w-xl mx-auto text-stone-400">Професійний манікюр з гарантією якості та стерильності. Записуйся онлайн у декілька кліків.</p>
                    <button onClick={() => setView('booking')} className="bg-stone-900 text-white px-12 py-5 rounded-3xl font-bold shadow-xl hover:scale-105 transition">Записатись зараз</button>
                </div>
            );
        }

        function BookingView({ user, profile, appointments, customSchedule, onBook, onOpenLogin }) {
            const [step, setStep] = useState(1);
            const [form, setForm] = useState({ service: '', date: '', time: '' });

            if (!user) return (
                <div className="max-w-md mx-auto py-20 text-center space-y-6 bg-white p-12 rounded-[3rem] shadow-sm">
                    <div className="text-5xl">🔐</div>
                    <h2 className="text-2xl font-black">Потрібна авторизація</h2>
                    <p className="text-stone-400 text-sm">Увійдіть у свій акаунт, щоб переглянути доступні години та здійснити запис.</p>
                    <button onClick={onOpenLogin} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold">Увійти</button>
                </div>
            );

            const getSlotsForDate = (date) => {
                return customSchedule[date] || DEFAULT_TIME_SLOTS;
            };

            const isBooked = (date, time) => {
                return appointments.some(a => a.date === date && a.time === time && (a.status === 'confirmed' || a.status === 'pending'));
            };

            return (
                <div className="max-w-xl mx-auto bg-white p-10 rounded-[3rem] shadow-sm border border-stone-50">
                    <div className="flex gap-2 mb-8">
                        {[1, 2, 3].map(i => <div key={i} className={`h-1.5 flex-1 rounded-full ${step >= i ? 'bg-pink-500' : 'bg-stone-100'}`}></div>)}
                    </div>

                    {step === 1 && (
                        <div className="space-y-4">
                            <h2 className="text-2xl font-black">Оберіть послугу</h2>
                            {SERVICES.map(s => (
                                <button key={s.id} onClick={() => {setForm({...form, service: s.name}); setStep(2);}} className="w-full p-6 text-left border-2 border-stone-50 rounded-2xl hover:border-pink-500 transition flex justify-between items-center group">
                                    <span className="font-bold group-hover:text-pink-500">{s.name}</span>
                                    <span className="font-black text-stone-300">{s.price} ₴</span>
                                </button>
                            ))}
                        </div>
                    )}

                    {step === 2 && (
                        <div className="space-y-6">
                            <h2 className="text-2xl font-black">Дата та час</h2>
                            <input type="date" min={new Date().toISOString().split('T')[0]} className="w-full p-4 bg-stone-50 rounded-xl outline-none" onChange={e => setForm({...form, date: e.target.value})} />
                            {form.date && (
                                <div className="grid grid-cols-3 gap-2">
                                    {getSlotsForDate(form.date).map(t => {
                                        const booked = isBooked(form.date, t);
                                        return (
                                            <button key={t} disabled={booked} onClick={() => setForm({...form, time: t})} className={`p-3 rounded-xl font-bold text-xs ${booked ? 'bg-stone-50 text-stone-200' : form.time === t ? 'bg-pink-500 text-white' : 'bg-stone-100'}`}>
                                                {booked ? 'Зайнято' : t}
                                            </button>
                                        );
                                    })}
                                </div>
                            )}
                            <div className="flex gap-4 pt-4">
                                <button onClick={() => setStep(1)} className="flex-1 font-bold text-stone-300">Назад</button>
                                <button disabled={!form.time} onClick={() => setStep(3)} className="flex-[2] bg-stone-900 text-white py-4 rounded-xl font-bold disabled:opacity-30">Далі</button>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="space-y-8 text-center">
                            <h2 className="text-2xl font-black">Підтвердження</h2>
                            <div className="bg-stone-50 p-6 rounded-3xl text-left space-y-3">
                                <p className="text-xs font-black uppercase text-stone-400">Послуга</p>
                                <p className="font-bold">{form.service}</p>
                                <p className="text-xs font-black uppercase text-stone-400">Дата та час</p>
                                <p className="font-bold">{form.date} о {form.time}</p>
                                <p className="text-xs font-black uppercase text-stone-400">Instagram</p>
                                <p className="font-bold text-pink-500">@{profile.instagram || 'Вкажіть у профілі'}</p>
                            </div>
                            <button onClick={() => onBook({...form, instagram: profile.instagram, userId: user.uid, userEmail: user.email})} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-100">Записатись</button>
                        </div>
                    )}
                </div>
            );
        }

        function CabinetView({ user, profile, appointments, onUpdateProfile }) {
            const [ig, setIg] = useState(profile.instagram || '');
            return (
                <div className="grid md:grid-cols-3 gap-10">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm h-fit space-y-6">
                        <div className="w-20 h-20 bg-pink-50 text-pink-500 rounded-full flex items-center justify-center text-3xl mx-auto font-serif italic">N</div>
                        <div className="text-center">
                            <h3 className="font-black truncate">{user.email}</h3>
                            <p className="text-[10px] text-stone-400 font-bold uppercase tracking-widest mt-1">Клієнт</p>
                        </div>
                        <div className="space-y-2">
                            <label className="text-[10px] font-black uppercase text-stone-400 ml-2">Ваш Instagram</label>
                            <div className="relative">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-pink-500 font-bold">@</span>
                                <input value={ig} onChange={e => setIg(e.target.value.replace('@', ''))} className="w-full p-4 pl-9 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-pink-500 transition" placeholder="username" />
                            </div>
                            <button onClick={() => onUpdateProfile({instagram: ig})} className="w-full bg-stone-900 text-white py-3 rounded-2xl font-bold text-sm">Зберегти</button>
                        </div>
                    </div>

                    <div className="md:col-span-2 space-y-6">
                        <h2 className="text-2xl font-black">Історія візитів</h2>
                        <div className="space-y-3">
                            {appointments.length === 0 ? (
                                <div className="p-20 text-center text-stone-300 font-bold border-2 border-dashed rounded-[2.5rem]">У вас ще немає записів</div>
                            ) : (
                                appointments.map(a => (
                                    <div key={a.id} className="bg-white p-6 rounded-2xl border border-stone-100 flex justify-between items-center">
                                        <div>
                                            <p className="font-black">{a.service}</p>
                                            <p className="text-xs text-stone-400 font-bold">{a.date} • {a.time}</p>
                                        </div>
                                        <div className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${a.status==='confirmed'?'bg-green-100 text-green-600' : a.status==='pending' ? 'bg-yellow-100 text-yellow-600' : 'bg-stone-100 text-stone-400'}`}>
                                            {a.status === 'confirmed' ? 'Підтверджено' : a.status === 'pending' ? 'В обробці' : 'Скасовано'}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function AdminPanel({ appointments, customSchedule, onUpdateStatus, onUpdateSchedule }) {
            const [activeTab, setActiveTab] = useState('requests');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [clientHistory, setClientHistory] = useState(null);

            // Календарні розрахунки
            const daysInMonth = (month) => {
                const year = month.getFullYear();
                const m = month.getMonth();
                const days = new Date(year, m + 1, 0).getDate();
                const firstDay = new Date(year, m, 1).getDay();
                return { days, firstDay: firstDay === 0 ? 6 : firstDay - 1 };
            };

            const { days, firstDay } = daysInMonth(currentMonth);

            const isDayWithAppointments = (dateStr) => appointments.some(a => a.date === dateStr && a.status === 'confirmed');
            const isDayWithRequests = (dateStr) => appointments.some(a => a.date === dateStr && a.status === 'pending');

            return (
                <div className="space-y-8">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                        <h2 className="text-3xl font-black">Панель Адміністратора</h2>
                        <div className="flex bg-stone-100 p-1 rounded-2xl gap-1">
                            {['requests', 'calendar', 'schedule'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition ${activeTab===t ? 'bg-white shadow-sm' : 'text-stone-400'}`}>
                                    {t === 'requests' ? 'Запити' : t === 'calendar' ? 'Календар' : 'Графік'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {activeTab === 'requests' && (
                        <div className="space-y-4">
                            {appointments.filter(a => a.status === 'pending').map(a => (
                                <div key={a.id} className="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-3">
                                            <span className="font-black text-xl">{a.service}</span>
                                            <button onClick={() => setClientHistory(a.userId)} className="bg-pink-100 text-pink-500 text-[10px] px-2 py-0.5 rounded font-black uppercase hover:bg-pink-200">@{a.instagram}</button>
                                        </div>
                                        <p className="text-stone-400 font-bold">{a.date} о {a.time} • {a.userEmail}</p>
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto">
                                        <button onClick={() => onUpdateStatus(a.id, 'confirmed')} className="flex-1 bg-green-500 text-white px-6 py-3 rounded-xl font-bold">Прийняти</button>
                                        <button onClick={() => onUpdateStatus(a.id, 'rejected')} className="flex-1 bg-stone-100 text-red-500 px-6 py-3 rounded-xl font-bold">Відхилити</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'calendar' && (
                        <div className="grid md:grid-cols-2 gap-10">
                            <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-stone-100 h-fit">
                                <div className="flex justify-between items-center mb-8">
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth()-1)))} className="p-2 bg-stone-50 rounded-full">←</button>
                                    <h3 className="font-black uppercase tracking-widest text-sm">{currentMonth.toLocaleString('uk-UA', {month: 'long', year: 'numeric'})}</h3>
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth()+1)))} className="p-2 bg-stone-50 rounded-full">→</button>
                                </div>
                                <div className="calendar-grid gap-2 text-center text-[10px] font-black text-stone-300 uppercase mb-4">
                                    {['Пн','Вт','Ср','Чт','Пт','Сб','Нд'].map(d => <div key={d}>{d}</div>)}
                                </div>
                                <div className="calendar-grid gap-2">
                                    {Array(firstDay).fill(0).map((_, i) => <div key={`empty-${i}`}></div>)}
                                    {Array.from({length: days}, (_, i) => {
                                        const dateObj = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), i + 1);
                                        const dateStr = dateObj.toISOString().split('T')[0];
                                        const hasApp = isDayWithAppointments(dateStr);
                                        const hasReq = isDayWithRequests(dateStr);
                                        return (
                                            <button key={i} onClick={() => setSelectedDate(dateStr)} className={`aspect-square rounded-xl text-xs font-black relative flex items-center justify-center ${selectedDate === dateStr ? 'bg-stone-900 text-white' : 'bg-stone-50 text-stone-600 hover:bg-stone-100'}`}>
                                                {i + 1}
                                                {hasApp && <div className="absolute bottom-1 w-1 h-1 bg-green-500 rounded-full"></div>}
                                                {hasReq && <div className="absolute top-1 right-1 w-1.5 h-1.5 bg-pink-500 rounded-full animate-pulse"></div>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h3 className="font-black text-xl">Записи на {selectedDate}</h3>
                                {appointments.filter(a => a.date === selectedDate).length === 0 ? (
                                    <div className="p-10 bg-stone-50 rounded-3xl text-stone-300 font-bold text-center">На цей день немає записів</div>
                                ) : (
                                    appointments.filter(a => a.date === selectedDate).map(a => (
                                        <div key={a.id} className="bg-white p-6 rounded-2xl border border-stone-100 flex justify-between items-center shadow-sm">
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <span className="font-black">{a.time}</span>
                                                    <span className={`w-2 h-2 rounded-full ${a.status==='confirmed'?'bg-green-500':'bg-yellow-500'}`}></span>
                                                </div>
                                                <p className="text-xs text-stone-400 font-bold">{a.service} • @{a.instagram}</p>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => onUpdateStatus(a.id, 'confirmed')} className="p-2 bg-green-50 text-green-600 rounded-lg hover:bg-green-100">✓</button>
                                                <button onClick={() => onUpdateStatus(a.id, 'rejected')} className="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100">✕</button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'schedule' && (
                        <div className="max-w-xl mx-auto bg-white p-10 rounded-[3rem] shadow-sm border border-stone-100">
                            <h3 className="text-2xl font-black mb-6 text-center">Налаштування годин</h3>
                            <input type="date" value={selectedDate} className="w-full p-4 bg-stone-50 rounded-2xl outline-none mb-6" onChange={e => setSelectedDate(e.target.value)} />
                            <div className="space-y-4">
                                <div className="flex flex-wrap gap-2">
                                    {(customSchedule[selectedDate] || DEFAULT_TIME_SLOTS).map(t => (
                                        <div key={t} className="flex items-center gap-2 bg-stone-900 text-white px-4 py-2 rounded-xl font-bold text-xs">
                                            {t}
                                            <button onClick={() => {
                                                const current = customSchedule[selectedDate] || DEFAULT_TIME_SLOTS;
                                                onUpdateSchedule(selectedDate, current.filter(x => x !== t));
                                            }} className="text-pink-400">✕</button>
                                        </div>
                                    ))}
                                </div>
                                <div className="pt-6 border-t border-stone-100 flex gap-2">
                                    <input id="new-slot" type="time" className="flex-1 p-4 bg-stone-50 rounded-2xl outline-none" />
                                    <button onClick={() => {
                                        const val = document.getElementById('new-slot').value;
                                        if (!val) return;
                                        const current = customSchedule[selectedDate] || DEFAULT_TIME_SLOTS;
                                        if (current.includes(val)) return;
                                        onUpdateSchedule(selectedDate, [...current, val].sort());
                                    }} className="bg-pink-500 text-white px-6 rounded-2xl font-bold">+</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {clientHistory && (
                        <ClientHistoryModal 
                            userId={clientHistory} 
                            appointments={appointments} 
                            onClose={() => setClientHistory(null)} 
                        />
                    )}
                </div>
            );
        }

        function ClientHistoryModal({ userId, appointments, onClose }) {
            const history = appointments.filter(a => a.userId === userId);
            const ig = history[0]?.instagram || 'Клієнт';
            return (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl relative max-h-[80vh] overflow-y-auto">
                        <button onClick={onClose} className="absolute top-8 right-8 text-stone-300">✕</button>
                        <h2 className="text-2xl font-black mb-8">Історія @{ig}</h2>
                        <div className="space-y-3">
                            {history.map(a => (
                                <div key={a.id} className="p-5 border border-stone-100 rounded-2xl flex justify-between items-center">
                                    <div>
                                        <p className="font-bold">{a.service}</p>
                                        <p className="text-xs text-stone-400 font-bold">{a.date} о {a.time}</p>
                                    </div>
                                    <span className="text-[10px] font-black uppercase text-stone-400">{a.status}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function LoginModal({ onClose }) {
            const [isReg, setIsReg] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                try {
                    if (isReg) await firebase.auth().createUserWithEmailAndPassword(email, pass);
                    else await firebase.auth().signInWithEmailAndPassword(email, pass);
                    onClose();
                } catch (e) { alert("Помилка: " + e.message); }
            };

            return (
                <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl relative">
                        <button onClick={onClose} className="absolute top-6 right-6 text-stone-300">✕</button>
                        <h2 className="text-3xl font-black mb-8">{isReg ? 'Реєстрація' : 'Вхід'}</h2>
                        <form className="space-y-4" onSubmit={handleAuth}>
                            <input type="email" placeholder="Email" required className="w-full p-4 bg-stone-50 rounded-xl outline-none border focus:border-pink-500" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Пароль" required className="w-full p-4 bg-stone-50 rounded-xl outline-none border focus:border-pink-500" value={pass} onChange={e => setPass(e.target.value)} />
                            <button className="w-full bg-pink-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-pink-100">{isReg ? 'Створити акаунт' : 'Увійти'}</button>
                        </form>
                        <button onClick={() => setIsReg(!isReg)} className="w-full mt-6 text-[10px] font-black text-stone-400 uppercase tracking-widest">{isReg ? 'Вже є акаунт? Увійти' : 'Немає акаунту? Реєстрація'}</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
